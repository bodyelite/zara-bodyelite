<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BODY ELITE - CEO RADAR (MATCH FLEXIBLE)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #060B14; --card: #111827; --border: #1F2937; --text: #F9FAFB; --muted: #9CA3AF; --green: #10B981; --red: #EF4444; --blue: #3B82F6; --alert: #F59E0B; --purple: #8B5CF6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px; }
        .container { max-width: 1600px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header h1 { margin: 0; font-weight: 900; font-size: 28px; color: var(--text); letter-spacing: -1px; }
        .header span { color: var(--blue); }
        .upload-section { display: grid; grid-template-columns: repeat(3, 1fr) 200px; gap: 15px; background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 30px; align-items: end; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .upload-box label { display: block; font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px;}
        .upload-box input { width: 100%; background: #000; border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; box-sizing: border-box; font-family: monospace; font-size: 12px;}
        .date-box { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { background: var(--blue); color: #fff; border: none; padding: 14px; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; transition: 0.3s; height: 44px; }
        .btn:hover { background: #2563EB; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .decision-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .ad-card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; gap: 20px; position: relative; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3); transition: 0.3s; }
        .ad-card:hover { transform: translateY(-5px); border-color: var(--blue); }
        .ad-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; }
        .ad-card.good::before { background: var(--green); }
        .ad-card.bad::before { background: var(--red); }
        .ad-card.warning::before { background: var(--alert); }
        .ad-card.neutral::before { background: var(--muted); }
        .ad-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .ad-title { font-size: 16px; font-weight: 900; margin: 0; color: var(--text); text-transform: uppercase; }
        .ad-spend { font-size: 14px; color: var(--muted); font-family: monospace; font-weight: 600; margin-top: 4px; }
        .ad-status { padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 900; letter-spacing: 1px; }
        .ad-status.potenciar { background: rgba(16,185,129,0.15); color: var(--green); }
        .ad-status.apagar { background: rgba(239,68,68,0.15); color: var(--red); }
        .ad-status.observacion { background: rgba(245,158,11,0.15); color: var(--alert); }
        .ad-status.organico { background: rgba(156,163,175,0.15); color: var(--muted); }
        .pipeline-flow { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .flow-step { text-align: center; }
        .flow-val { font-size: 20px; font-weight: 900; margin-bottom: 2px; }
        .flow-label { font-size: 9px; color: var(--muted); text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; }
        .flow-arrow { color: var(--border); font-size: 12px; }
        .ad-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 15px; }
        .ad-cac-label { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; }
        .ad-cac-val { font-size: 18px; font-weight: 900; font-family: monospace; }
        .table-container { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow-x: auto; padding: 1px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: center; }
        th { background: #000; color: var(--muted); padding: 16px 12px; font-weight: 800; text-transform: uppercase; border-bottom: 2px solid var(--border); font-size: 10px; letter-spacing: 0.5px; }
        td { padding: 16px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:hover { background: rgba(255,255,255,0.02); }
        tfoot { background: #000; font-weight: 900; font-size: 13px; }
        tfoot td { border-top: 2px solid var(--border); color: var(--text); }
        .text-left { text-align: left; }
        .money { font-family: monospace; font-weight: bold; }
        #loader { display: none; text-align: center; padding: 80px; font-weight: 900; color: var(--blue); font-size: 18px; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>BODY ELITE <span>CEO BOARD</span></h1>
                <p style="margin-top: 5px; color: var(--muted); font-size: 14px;">Indexación Flexible de Frases y Pipeline del Futuro</p>
            </div>
            <div class="date-box">
                <div>
                    <label style="font-size:10px; color:var(--muted); font-weight:800; display:block; margin-bottom:5px;">VENTANA DESDE</label>
                    <input type="date" id="fi" value="2026-02-01" style="background:#000; border:1px solid var(--border); color:var(--text); padding:10px; border-radius:6px;">
                </div>
                <div>
                    <label style="font-size:10px; color:var(--muted); font-weight:800; display:block; margin-bottom:5px;">VENTANA HASTA</label>
                    <input type="date" id="ff" value="2026-03-31" style="background:#000; border:1px solid var(--border); color:var(--text); padding:10px; border-radius:6px;">
                </div>
            </div>
        </div>

        <div class="upload-section">
            <div class="upload-box"><label>1. META (GASTO CSV)</label><input type="file" id="fm" accept=".csv, .xlsx, .xls"></div>
            <div class="upload-box"><label style="color:var(--green);">2. ZARA (DASH CSV)</label><input type="file" id="fz" accept=".csv, .xlsx, .xls"></div>
            <div class="upload-box"><label>3. RESERVO (CITAS CSV)</label><input type="file" id="fr" accept=".xlsx,.xls,.csv"></div>
            <button class="btn" onclick="ejecutarRadar()">CALCULAR RETORNO</button>
        </div>

        <div id="loader">CRUZANDO TELÉFONOS Y EVALUANDO PIPELINE... ⚙️</div>

        <div id="dashboard" style="display:none;">
            <div class="decision-grid" id="gridTarjetas"></div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th class="text-left" style="width: 200px;">CÉLULA DE CAMPAÑA</th>
                            <th>GASTO TOTAL</th>
                            <th>RES META</th>
                            <th style="border-left: 2px solid var(--border); color:var(--text);">ENTRARON (DASH)</th>
                            <th style="color:var(--muted);">DORMIDOS 💤</th>
                            <th style="color:var(--alert);">CON INTENCIÓN 🔥</th>
                            <th style="border-left: 2px solid var(--border); background:rgba(139,92,246,0.1); color:var(--purple);">FUTUROS (PIPELINE) ⏳</th>
                            <th style="background:rgba(16,185,129,0.1); color:var(--green);">ASISTIERON (PRESENTE) ✅</th>
                            <th style="color:var(--blue);">COMPRARON 💰</th>
                            <th style="border-left: 2px solid var(--border);">ESTADO / CAC (PRESENTE)</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoEmbudo"></tbody>
                    <tfoot id="pieEmbudo"></tfoot>
                </table>
            </div>
        </div>
    </div>

    <script>
        const cleanPhone = (n) => String(n || '').split('.')[0].replace(/\D/g,'').slice(-8);
        const norm = (s) => String(s || '').normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        const fmtMoney = (n) => new Intl.NumberFormat('es-CL', {style:'currency', currency:'CLP', maximumFractionDigits: 0}).format(n);
        
        function excelToDate(serial) {
            if(!serial || isNaN(serial)) return 0;
            return Math.round((parseFloat(serial) - 25569) * 86400 * 1000) + (new Date().getTimezoneOffset() * 60000);
        }

        function parseChileanDate(dateStr) {
            if(!dateStr) return 0;
            let parts = String(dateStr).split(' ')[0].split('-');
            if(parts.length === 3) {
                if (parts[0].length <= 2) return new Date(parts[2], parts[1]-1, parts[0]).getTime();
                return new Date(parts[0], parts[1]-1, parts[2]).getTime();
            }
            return new Date(dateStr).getTime();
        }

        // MOTOR DE AGRUPACIÓN FLEXIBLE
        // Asociamos las palabras clave difusas al grupo de anuncios correcto
        const REGLAS_FLEXIBLES = [
            { 
                id: "🎯 CÉLULA LIPO", 
                metaKeywords: ["lipo", "video_fran", "trajeblanco"], 
                zaraKeywords: ["lipo"] // Cubre "lipo express", "plan lipo", "diagnostica lipo"
            },
            { 
                id: "✨ CÉLULA FACIAL", 
                metaKeywords: ["facial", "rostro", "hifu", "antiage", "pink"], 
                zaraKeywords: ["facial", "rostro", "hifu", "limpieza"] // Cubre "evaluacion rostro", "limpieza facial", "diagnostico facial"
            },
            { 
                id: "🍑 CÉLULA GLÚTEOS", 
                metaKeywords: ["gluteo", "push", "piscina"], 
                zaraKeywords: ["gluteo", "push"] // Cubre "evaluacion gluteos", "plan push up"
            }
        ];

        async function rxArray(f) { return new Promise(r => { const reader = new FileReader(); reader.onload = (e) => r(XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).SheetNames[0]], {header: 1, raw: false})); reader.readAsArrayBuffer(f); }); }
        
        async function readDashCSV(f) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    let lines = e.target.result.split('\n');
                    let data = [];
                    lines.forEach(line => {
                        if (line.trim()) {
                            let row = line.split(';').map(c => c.replace(/^"|"$/g, '').trim());
                            data.push(row);
                        }
                    });
                    resolve(data);
                };
                reader.readAsText(f);
            });
        }

        async function ejecutarRadar() {
            const fm = document.getElementById('fm').files[0], fz = document.getElementById('fz').files[0], fr = document.getElementById('fr').files[0];
            if(!fm || !fz || !fr) return alert('Sube los 3 archivos.');
            
            const fi = new Date(document.getElementById('fi').value + 'T00:00:00').getTime();
            const ff = new Date(document.getElementById('ff').value + 'T23:59:59').getTime();

            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            try {
                const [metaArr, zaraRaw, reserArr] = await Promise.all([rxArray(fm), readDashCSV(fz), rxArray(fr)]);
                let celulas = {}; 

                REGLAS_FLEXIBLES.forEach(r => {
                    celulas[r.id] = { nombre: r.id, gasto: 0, resMeta: 0, entraron: 0, dormidos: 0, conIntencion: 0, asistieron: 0, futuros: 0, compraron: 0 };
                });
                celulas["ORGÁNICO / OTROS"] = { nombre: "ORGÁNICO / OTROS", gasto: 0, resMeta: 0, entraron: 0, dormidos: 0, conIntencion: 0, asistieron: 0, futuros: 0, compraron: 0 };

                // 1. LEER META
                const metaH = metaArr[0] || [];
                let cAnuncio = metaH.findIndex(h => String(h).toLowerCase().includes('anuncio') || String(h).toLowerCase().includes('ad name'));
                let cGasto = metaH.findIndex(h => String(h).toLowerCase().includes('importe gastado') || String(h).toLowerCase().includes('spent'));
                let cRes = metaH.findIndex(h => String(h).toLowerCase() === 'resultados' || String(h).toLowerCase().includes('results'));
                
                metaArr.slice(1).forEach(r => {
                    let nombreOriginal = String(r[cAnuncio] || '').trim();
                    let nombreNorm = norm(nombreOriginal);
                    let spend = parseFloat(r[cGasto]) || 0;
                    let resultados = parseInt(r[cRes]) || 0;
                    
                    if(spend > 0) {
                        let keyTarget = "ORGÁNICO / OTROS";
                        for (let regla of REGLAS_FLEXIBLES) {
                            if (regla.metaKeywords.some(k => nombreNorm.includes(k))) { keyTarget = regla.id; break; }
                        }
                        celulas[keyTarget].gasto += spend;
                        celulas[keyTarget].resMeta += resultados;
                    }
                });

                // 2. MAPA DE TELÉFONOS RESERVO (Últimos 8 dígitos son sagrados)
                const reserHeaders = reserArr[0] || [];
                let cTelR = reserHeaders.findIndex(h => String(h).toLowerCase().includes('tel') || String(h).toLowerCase().includes('celular'));
                let cEstR = reserHeaders.findIndex(h => String(h).toLowerCase().trim() === 'estado cita' || String(h).toLowerCase().includes('estado cita'));
                let cPagoR = reserHeaders.findIndex(h => String(h).toLowerCase().trim() === 'estado pago' || String(h).toLowerCase().includes('estado pago'));
                let cFecR = reserHeaders.findIndex(h => String(h).toLowerCase().trim() === 'fecha');
                
                if(cTelR === -1) cTelR = 11; if(cEstR === -1) cEstR = 13; if(cPagoR === -1) cPagoR = 14; if(cFecR === -1) cFecR = 1;

                let reservoMap = {};
                reserArr.slice(1).forEach(row => {
                    let t = cleanPhone(row[cTelR]);
                    if(t.length >= 8) {
                        let f = excelToDate(row[cFecR]);
                        // Si un cliente tiene múltiples citas, guardamos un array
                        if(!reservoMap[t]) reservoMap[t] = [];
                        reservoMap[t].push({ estado: norm(row[cEstR]), pago: norm(row[cPagoR]), fecha: f });
                    }
                });

                // 3. PROCESAR DASH CSV (CRUCE FLEXIBLE + MATCH DE TELÉFONOS)
                let zh = zaraRaw[0] || [];
                let cFecZ = zh.findIndex(h => String(h).toLowerCase().includes('fecha'));
                let cTelZ = zh.findIndex(h => String(h).toLowerCase().includes('telefono'));
                let cEstZ = zh.findIndex(h => String(h).toLowerCase().includes('estado'));
                let cMsgZ = zh.findIndex(h => String(h).toLowerCase().includes('primer mensaje'));

                if(cFecZ === -1) cFecZ = 0; if(cTelZ === -1) cTelZ = 1; if(cEstZ === -1) cEstZ = 3; if(cMsgZ === -1) cMsgZ = 4;

                zaraRaw.slice(1).forEach(r => {
                    let ts = parseChileanDate(r[cFecZ]);
                    if(ts < fi || ts > ff) return; // Fuera del filtro de fechas
                    
                    let msg = norm(r[cMsgZ]);
                    let phone = cleanPhone(r[cTelZ]);
                    let tag = norm(r[cEstZ]).toUpperCase();
                    
                    if(!msg && !tag) return;

                    // Match Flexible de Frase
                    let adDuenio = "ORGÁNICO / OTROS";
                    for (let regla of REGLAS_FLEXIBLES) {
                        if (regla.zaraKeywords.some(k => msg.includes(k))) { adDuenio = regla.id; break; }
                    }

                    const s = celulas[adDuenio];
                    s.entraron++;

                    let tieneIntencion = ['HOT', 'INTERESADO', 'GESTIÓN', 'AGENDADO'].includes(tag);
                    let asistePresente = false;
                    let esFuturo = false;
                    let compro = false;

                    // Cruzar con Reservo Map
                    let citas = reservoMap[phone] || [];
                    citas.forEach(c => {
                        let cancelada = ['anula', 'no asiste', 'cancelado', 'no llegó', 'eliminado'].includes(c.estado);
                        if(!cancelada) {
                            tieneIntencion = true; // Si hay cita activa, tuvo intención.
                            
                            // Evaluar la Máquina del Tiempo
                            if (c.fecha > ff) {
                                esFuturo = true;
                            } else {
                                if(['asiste', 'atendido', 'realizado', 'confirmado'].includes(c.estado)) asistePresente = true;
                            }

                            if(['pagado', 'abono', 'plan', 'si'].includes(c.pago)) compro = true;
                        }
                    });

                    if(tieneIntencion) s.conIntencion++; else s.dormidos++;
                    if(asistePresente) s.asistieron++;
                    if(esFuturo && !asistePresente) s.futuros++;
                    if(compro) s.compraron++;
                });

                // 4. RENDERIZAR
                let htmlTabla = "";
                let htmlGrid = "";
                let tGasto=0, tMeta=0, tEntr=0, tDorm=0, tInt=0, tAsis=0, tFut=0, tComp=0;

                Object.values(celulas).sort((a,b) => b.gasto - a.gasto).forEach(s => {
                    if(s.gasto === 0 && s.entraron === 0) return; 

                    tGasto += s.gasto; tMeta += s.resMeta; tEntr += s.entraron;
                    tDorm += s.dormidos; tInt += s.conIntencion; tAsis += s.asistieron; tFut += s.futuros; tComp += s.compraron;

                    let cac = s.asistieron > 0 ? s.gasto / s.asistieron : 0;
                    
                    let estadoClass = "neutral", badgeClass = "organico", badgeText = "ORGÁNICO", cacText = "---", cacClass = "";
                    
                    if (s.gasto > 0) {
                        if (s.asistieron > 0) {
                            estadoClass = "good"; badgeClass = "potenciar"; badgeText = "🔥 POTENCIAR";
                            cacText = "$" + fmtMoney(cac); cacClass = "cac-good";
                        } else if (s.futuros > 0) {
                            estadoClass = "warning"; badgeClass = "observacion"; badgeText = "👀 EN PIPELINE (FUTURO)";
                            cacText = "ESPERANDO CITA"; cacClass = "cac-warning";
                        } else if (s.conIntencion > 0) {
                            estadoClass = "warning"; badgeClass = "observacion"; badgeText = "👀 EN OBSERVACIÓN";
                            cacText = "SIN CITA AÚN"; cacClass = "cac-warning";
                        } else {
                            estadoClass = "bad"; badgeClass = "apagar"; badgeText = "💀 APAGAR";
                            cacText = "PÉRDIDA"; cacClass = "cac-bad";
                        }
                    }

                    if (s.nombre !== "ORGÁNICO / OTROS" || s.entraron > 0) {
                        htmlGrid += `
                        <div class="ad-card ${estadoClass}">
                            <div class="ad-header">
                                <div>
                                    <h3 class="ad-title">${s.nombre}</h3>
                                    <div class="ad-spend">Gasto: $${fmtMoney(s.gasto)}</div>
                                </div>
                                <div class="ad-status ${badgeClass}">${badgeText}</div>
                            </div>
                            
                            <div class="pipeline-flow">
                                <div class="flow-step"><div class="flow-val" style="color:var(--muted);">${s.resMeta}</div><div class="flow-label">Meta</div></div>
                                <div class="flow-arrow">➔</div>
                                <div class="flow-step"><div class="flow-val">${s.entraron}</div><div class="flow-label">Dash</div></div>
                                <div class="flow-arrow">➔</div>
                                <div class="flow-step"><div class="flow-val" style="color:var(--purple);">${s.futuros}</div><div class="flow-label">Futuros</div></div>
                                <div class="flow-arrow">➔</div>
                                <div class="flow-step"><div class="flow-val" style="color:var(--green);">${s.asistieron}</div><div class="flow-label">Asistió</div></div>
                            </div>

                            <div class="ad-footer">
                                <span class="ad-cac-label">Estado CAC Presente</span>
                                <span class="ad-cac-val" style="color:${cac > 0 ? 'var(--green)' : 'inherit'}; font-weight:900;">${cacText}</span>
                            </div>
                        </div>`;
                    }

                    htmlTabla += `<tr>
                        <td class="text-left"><b style="color:var(--text); font-size:12px;">${s.nombre}</b></td>
                        <td class="money">${s.gasto > 0 ? fmtMoney(s.gasto) : '---'}</td>
                        <td style="color:var(--muted)">${s.resMeta > 0 ? s.resMeta : '-'}</td>
                        <td style="border-left: 2px solid var(--border); font-weight:900; font-size:14px;">${s.entraron}</td>
                        <td style="color:var(--muted);">${s.dormidos}</td>
                        <td style="color:var(--alert); font-weight:bold;">${s.conIntencion}</td>
                        <td style="border-left: 2px solid var(--border); background:rgba(139,92,246,0.1); color:var(--purple); font-weight:900; font-size:14px;">${s.futuros}</td>
                        <td style="background:rgba(16,185,129,0.1); color:var(--green); font-weight:900; font-size:14px;">${s.asistieron}</td>
                        <td style="font-size:14px; font-weight:900; color:var(--blue);">${s.compraron}</td>
                        <td style="border-left: 2px solid var(--border); font-family:monospace; font-size:13px; font-weight:bold;" class="${cacClass}">${cacText}</td>
                    </tr>`;
                });

                document.getElementById('gridTarjetas').innerHTML = htmlGrid;
                document.getElementById('cuerpoEmbudo').innerHTML = htmlTabla;
                
                let cacTotal = tAsis > 0 ? tGasto / tAsis : 0;
                document.getElementById('pieEmbudo').innerHTML = `<tr>
                    <td class="text-left" style="color:var(--blue);">TOTALES / PROMEDIOS</td>
                    <td class="money">${fmtMoney(tGasto)}</td>
                    <td style="color:var(--muted)">${tMeta}</td>
                    <td style="border-left: 2px solid var(--border); font-weight:900; font-size:14px;">${tEntr}</td>
                    <td style="color:var(--muted);">${tDorm}</td>
                    <td style="color:var(--alert);">${tInt}</td>
                    <td style="border-left: 2px solid var(--border); background:rgba(139,92,246,0.1); color:var(--purple); font-weight:900; font-size:14px;">${tFut}</td>
                    <td style="background:rgba(16,185,129,0.1); color:var(--green); font-weight:900; font-size:14px;">${tAsis}</td>
                    <td style="font-size:14px; font-weight:900; color:var(--blue);">${tComp}</td>
                    <td style="border-left: 2px solid var(--border); color:var(--green); font-family:monospace; font-size:14px; font-weight:bold;">${cacTotal > 0 ? '$'+fmtMoney(cacTotal) : '---'}</td>
                </tr>`;

                document.getElementById('loader').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';

            } catch(e) {
                console.error(e);
                alert('Error procesando el archivo CSV. Revisa el formato.');
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
