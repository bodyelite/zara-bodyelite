<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría Estratégica Body Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --bg: #f8fafc; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; margin-bottom: 30px; }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; background: #f1f5f9; padding: 20px; border-radius: 12px; }
        label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; }
        .card h3 { font-size: 12px; color: #64748b; margin: 0; text-transform: uppercase; letter-spacing: 0.05em; }
        .card p { font-size: 24px; font-weight: 800; margin: 10px 0 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 8px; overflow: hidden; font-size: 13px; }
        th { background: #334155; color: white; padding: 15px; text-align: left; position: sticky; top: 0; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
        .hot { background: #fee2e2; color: #991b1b; }
        .fuga { background: #fff7ed; border: 1px solid #fb923c; color: #9a3412; }
        .loader { display: none; margin-top: 10px; font-weight: 600; color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ Altar de Números: Auditoría Body Elite</h1>
            <div id="loader" class="loader">⚙️ Procesando Datos...</div>
        </div>

        <div class="config-grid">
            <div><label>Desde:</label><input type="date" id="fi" value="2026-03-01"></div>
            <div><label>Hasta:</label><input type="date" id="ff" value="2026-03-31"></div>
            <div><label>Excel Meta Ads:</label><input type="file" id="fm" accept=".xls,.xlsx,.csv"></div>
            <div><label>Excel Reservo:</label><input type="file" id="fr" accept=".xls,.xlsx,.csv"></div>
        </div>

        <button id="btn" onclick="analizar()">EJECUTAR AUDITORÍA QUIRÚRGICA</button>

        <div id="dashboard" style="display:none; margin-top:40px;">
            <div class="metrics">
                <div class="card"><h3>Inversión</h3><p id="resGasto">$0</p></div>
                <div class="card"><h3>Leads Monitor</h3><p id="resLeads">0</p></div>
                <div class="card"><h3>Asistidas</h3><p id="resAsist">0</p></div>
                <div class="card"><h3>CAC REAL</h3><p id="resCac" style="color:var(--success);">$0</p></div>
            </div>

            <table id="tabla">
                <thead>
                    <tr>
                        <th>Lead</th>
                        <th>Estado</th>
                        <th>Origen</th>
                        <th>Bitácora / Notas</th>
                        <th>Reservo</th>
                        <th>Veredicto</th>
                    </tr>
                </thead>
                <tbody id="cuerpo"></tbody>
            </table>
        </div>
    </div>

    <script>
        const clean = (n) => String(n).replace(/\D/g,'').slice(-8);

        async function read(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                    resolve(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
                };
                reader.readAsArrayBuffer(file);
            });
        }

        async function analizar() {
            const fm = document.getElementById('fm').files[0];
            const fr = document.getElementById('fr').files[0];
            const fi = new Date(document.getElementById('fi').value);
            const ff = new Date(document.getElementById('ff').value);
            const btn = document.getElementById('btn');
            const load = document.getElementById('loader');

            if(!fm || !fr) return alert('Subí los reportes, Juan Carlos.');

            btn.disabled = true;
            load.style.display = 'block';

            try {
                const [dMeta, dReservo, resApi] = await Promise.all([
                    read(fm), read(fr), fetch('/api/data').then(r => r.json())
                ]);

                let totalGasto = 0;
                dMeta.forEach(row => {
                    const v = row['Importe gastado (CLP)'] || row['Amount spent'] || 0;
                    totalGasto += parseFloat(v.toString().replace(/[^0-9.]/g, '')) || 0;
                });

                const cuerpo = document.getElementById('cuerpo');
                cuerpo.innerHTML = '';
                let asistidas = 0;
                let leadsContados = 0;

                resApi.forEach(lead => {
                    const f = new Date(lead.lastMessageDate);
                    if(f < fi || f > ff) return;
                    leadsContados++;

                    const num = clean(lead.number);
                    const cita = dReservo.find(c => clean(c['Teléfono']) === num);
                    const esAsist = cita && (cita['Estado de la cita'] === 'Asiste' || cita['Estado de la cita'] === 'Realizado');
                    if(esAsist) asistidas++;

                    const tr = document.createElement('tr');
                    const esFuga = !cita && lead.status === 'HOT';
                    if(esFuga) tr.style.background = '#fff7ed';

                    tr.innerHTML = `
                        <td><b>${lead.name}</b><br><small>${lead.number}</small></td>
                        <td><span class="badge ${lead.status.toLowerCase()}">${lead.status}</span></td>
                        <td>${lead.adName || lead.firstMessage || 'Orgánico'}</td>
                        <td><div style="max-width:300px; font-style:italic;">${lead.notes || 'Sin notas'}</div></td>
                        <td>${cita ? '✅ ' + cita['Estado de la cita'] : '❌ No figura'}</td>
                        <td style="font-weight:bold;">${esAsist ? 'LOGRADO' : (esFuga ? 'FUGA CALIENTE' : 'SEGUIMIENTO')}</td>
                    `;
                    cuerpo.appendChild(tr);
                });

                document.getElementById('resGasto').innerText = totalGasto.toLocaleString('es-CL',{style:'currency',currency:'CLP'});
                document.getElementById('resLeads').innerText = leadsContados;
                document.getElementById('resAsist').innerText = asistidas;
                const cac = asistidas > 0 ? (totalGasto / asistidas) : totalGasto;
                document.getElementById('resCac').innerText = cac.toLocaleString('es-CL',{style:'currency',currency:'CLP'});

                document.getElementById('dashboard').style.display = 'block';
            } catch (e) {
                alert('Error en el Altar: ' + e.message);
            } finally {
                btn.disabled = false;
                load.style.display = 'none';
            }
        }
    </script>
</body>
</html>
