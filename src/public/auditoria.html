<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BODY ELITE - RADAR CEO (BACK TO BASICS)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #060B14; --card: #111827; --border: #1F2937; --text: #F9FAFB; --muted: #9CA3AF; --green: #10B981; --red: #EF4444; --blue: #3B82F6; --alert: #F59E0B; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px; }
        .container { max-width: 1600px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header h1 { margin: 0; font-weight: 900; font-size: 28px; color: var(--text); letter-spacing: -1px; }
        .upload-section { display: grid; grid-template-columns: repeat(3, 1fr) 200px; gap: 15px; background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 30px; align-items: end; }
        .upload-box label { display: block; font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
        .upload-box input { width: 100%; background: #000; border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; box-sizing: border-box; font-family: monospace; }
        .btn { background: var(--blue); color: #fff; border: none; padding: 14px; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; font-size: 14px; transition: 0.3s; height: 44px; }
        .decision-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .ad-card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 25px; position: relative; }
        .ad-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--muted); }
        .ad-card.good::before { background: var(--green); }
        .pipeline-flow { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 15px; border-radius: 12px; margin: 15px 0; }
        .flow-step { text-align: center; }
        .flow-val { font-size: 20px; font-weight: 900; }
        .flow-label { font-size: 9px; color: var(--muted); text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: center; background: var(--card); border-radius: 12px; overflow: hidden; }
        th { background: #000; color: var(--muted); padding: 16px 12px; border-bottom: 2px solid var(--border); }
        td { padding: 16px 12px; border-bottom: 1px solid var(--border); }
        #loader { display: none; text-align: center; padding: 50px; font-weight: 900; color: var(--blue); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>BODY ELITE <span>CEO RADAR</span></h1>
            <div style="display: flex; gap: 10px;">
                <input type="date" id="fi" value="2026-02-01" style="background:#000; color:#fff; border:1px solid var(--border); padding:10px; border-radius:6px;">
                <input type="date" id="ff" value="2026-03-31" style="background:#000; color:#fff; border:1px solid var(--border); padding:10px; border-radius:6px;">
            </div>
        </div>

        <div class="upload-section">
            <div class="upload-box"><label>1. META (XLS/CSV)</label><input type="file" id="fm"></div>
            <div class="upload-box"><label>2. DASH (CSV)</label><input type="file" id="fz"></div>
            <div class="upload-box"><label>3. RESERVO (XLS/CSV)</label><input type="file" id="fr"></div>
            <button class="btn" onclick="ejecutarRadar()">CALCULAR</button>
        </div>

        <div id="loader">RESTAURANDO ESTABILIDAD... ⚙️</div>
        <div id="dashboard" style="display:none;">
            <div class="decision-grid" id="gridTarjetas"></div>
            <table>
                <thead>
                    <tr>
                        <th style="text-align: left;">ANUNCIO</th>
                        <th>GASTO</th>
                        <th>ENTRARON</th>
                        <th>CON INTENCIÓN</th>
                        <th>AGENDAS (RESERVO)</th>
                        <th>ASISTIÓ</th>
                        <th>CAC</th>
                    </tr>
                </thead>
                <tbody id="cuerpoEmbudo"></tbody>
            </table>
        </div>
    </div>

    <script>
        const cleanPhone = (n) => String(n || '').split('.')[0].replace(/\D/g,'').slice(-8);
        const norm = (s) => String(s || '').normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        const fmt = (n) => new Intl.NumberFormat('es-CL', {style:'currency', currency:'CLP', maximumFractionDigits: 0}).format(n);
        
        const TRIANGULO = {
            "lipo fran": "quiero agendar mi evaluacion diagnostica lipo",
            "facial pia": "hola, quiero agendar diagnostico facial",
            "rostro verano": "quiero mi evaluacion rostro"
        };

        async function parseXLS(f) {
            return new Promise(resolve => {
                const r = new FileReader();
                r.onload = (e) => resolve(XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).SheetNames[0]], {header: 1, raw: false}));
                r.readAsArrayBuffer(f);
            });
        }

        async function parseDash(f) {
            return new Promise(resolve => {
                const r = new FileReader();
                r.onload = (e) => resolve(e.target.result.split('\n').filter(l => l.trim()).map(l => l.split(';').map(c => c.replace(/^"|"$/g, '').trim())));
                r.readAsText(f);
            });
        }

        async function ejecutarRadar() {
            const fm = document.getElementById('fm').files[0], fz = document.getElementById('fz').files[0], fr = document.getElementById('fr').files[0];
            if(!fm || !fz || !fr) return alert('Faltan archivos.');
            const fi = new Date(document.getElementById('fi').value + 'T00:00:00').getTime();
            const ff = new Date(document.getElementById('ff').value + 'T23:59:59').getTime();
            document.getElementById('loader').style.display = 'block';

            try {
                const [meta, dash, reser] = await Promise.all([parseXLS(fm), parseDash(fz), parseXLS(fr)]);
                let data = {};

                // 1. Meta
                meta.slice(1).forEach(r => {
                    let n = norm(r[2]), g = parseFloat(r[12]) || 0;
                    if(g > 0) {
                        let id = "OTROS";
                        for(let k in TRIANGULO) { if(n.includes(k)) id = k; }
                        if(!data[id]) data[id] = { name: id, gasto: 0, ent: 0, int: 0, agen: 0, asis: 0 };
                        data[id].gasto += g;
                    }
                });

                // 2. Reservo
                let rMap = {};
                reser.slice(1).forEach(r => {
                    let tel = cleanPhone(r[11]);
                    if(tel) rMap[tel] = { est: norm(r[13]), pago: norm(r[14]) };
                });

                // 3. Dash
                dash.slice(1).forEach(r => {
                    let fec = new Date(r[0].split(' ')[0].split('-').reverse().join('-')).getTime();
                    if(fec < fi || fec > ff) return;
                    let msg = norm(r[4]), tel = cleanPhone(r[1]), tag = norm(r[3]);
                    
                    let id = "OTROS";
                    for(let k in TRIANGULO) { if(msg.includes(TRIANGULO[k])) id = k; }
                    if(!data[id]) data[id] = { name: id, gasto: 0, ent: 0, int: 0, agen: 0, asis: 0 };

                    data[id].ent++;
                    if(['hot','interesado','gestion','agendado'].includes(tag)) data[id].int++;
                    
                    if(rMap[tel]) {
                        if(!['anula','cancelado','no llego'].includes(rMap[tel].est)) data[id].agen++;
                        if(['asiste','atendido','realizado'].includes(rMap[tel].est)) data[id].asis++;
                    }
                });

                let htmlT = "", htmlG = "";
                for(let k in data) {
                    let s = data[k], cac = s.agen > 0 ? s.gasto/s.agen : 0;
                    htmlG += `<div class="ad-card ${s.agen>0?'good':''}"><h3>${s.name.toUpperCase()}</h3><div class="pipeline-flow"><div class="flow-step"><div class="flow-val">${s.ent}</div><div class="flow-label">Dash</div></div><div>➔</div><div class="flow-step"><div class="flow-val">${s.agen}</div><div class="flow-label">Agendas</div></div></div></div>`;
                    htmlT += `<tr><td style="text-align:left;"><b>${s.name.toUpperCase()}</b></td><td class="money">${fmt(s.gasto)}</td><td>${s.ent}</td><td>${s.int}</td><td style="color:var(--green); font-weight:bold;">${s.agen}</td><td>${s.asis}</td><td style="font-weight:900;">${cac>0?fmt(cac):'---'}</td></tr>`;
                }
                document.getElementById('gridTarjetas').innerHTML = htmlG;
                document.getElementById('cuerpoEmbudo').innerHTML = htmlT;
                document.getElementById('loader').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } catch(e) { console.error(e); alert('Error.'); document.getElementById('loader').style.display = 'none'; }
        }
    </script>
</body>
</html>
