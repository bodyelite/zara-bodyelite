<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Estratégico Body Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background: #f1f5f9; padding: 20px; color: #0f172a; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .header { border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .config-bar { background: #f8fafc; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; border: 1px solid #e2e8f0; }
        .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; border: 1px solid #e2e8f0; text-align: center; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card h3 { font-size: 13px; color: #64748b; margin: 0; text-transform: uppercase; letter-spacing: 0.05em; }
        .card p { font-size: 26px; font-weight: 800; margin: 10px 0 0; }
        table { width: 100%; border-collapse: collapse; border-radius: 8px; overflow: hidden; font-size: 13px; margin-top: 20px; }
        th { background: #1e293b; color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #e2e8f0; }
        .fuga-badge { background: #fee2e2; color: #991b1b; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; }
        #btn-procesar { background: #2563eb; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #btn-procesar:disabled { background: #94a3b8; cursor: not-allowed; }
        #loader { display: none; font-weight: bold; color: #2563eb; margin-right: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ Altar de Números: Auditoría Body Elite</h1>
            <div>
                <span id="loader">⚙️ Procesando con Perfección Suiza...</span>
                <button id="btn-procesar" onclick="procesar()">AUDITAR AHORA</button>
            </div>
        </div>
        <div class="config-bar">
            <div><label>Desde:</label><input type="date" id="fi" value="2026-03-01"></div>
            <div><label>Hasta:</label><input type="date" id="ff" value="2026-03-31"></div>
            <div><label>Meta (Excel):</label><input type="file" id="fm"></div>
            <div><label>Reservo (Excel):</label><input type="file" id="fr"></div>
        </div>
        <div id="resumen" class="metric-grid" style="display:none;">
            <div class="card"><h3>Inversión</h3><p id="mGasto">$0</p></div>
            <div class="card"><h3>Leads Zara</h3><p id="mLeads">0</p></div>
            <div class="card"><h3>Asistidas</h3><p id="mAsist">0</p></div>
            <div class="card"><h3>CAC Real</h3><p id="mCac" style="color:#16a34a;">$0</p></div>
        </div>
        <div id="analisis-anuncios" style="display:none;">
            <h2>Rendimiento por Pieza Creativa</h2>
            <table>
                <thead>
                    <tr>
                        <th>Anuncio</th>
                        <th>Gasto</th>
                        <th>Leads</th>
                        <th>Fugas (HOT)</th>
                        <th>Logradas</th>
                        <th>CAC Real</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-ads"></tbody>
            </table>
        </div>
    </div>
    <script>
        const cleanNum = (n) => String(n).replace(/\D/g,'').slice(-8);
        async function leer(f) {
            return new Promise(r => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                    r(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
                };
                reader.readAsArrayBuffer(f);
            });
        }
        async function procesar() {
            const fm = document.getElementById('fm').files[0];
            const fr = document.getElementById('fr').files[0];
            const fi = new Date(document.getElementById('fi').value);
            const ff = new Date(document.getElementById('ff').value);
            if(!fm || !fr) return alert('Subí los reportes.');
            document.getElementById('btn-procesar').disabled = true;
            document.getElementById('loader').style.display = 'inline';
            try {
                const [dMeta, dReservo, resApi] = await Promise.all([leer(fm), leer(fr), fetch('/api/data')]);
                const dMonitor = await resApi.json();
                let ads = {};
                dMeta.forEach(row => {
                    const name = row['Nombre del anuncio'] || row['Ad Name'] || 'Desconocido';
                    const v = row['Importe gastado (CLP)'] || row['Amount spent'] || 0;
                    if(!ads[name]) ads[name] = { gasto: 0, leads: 0, fugas: 0, asistidas: 0 };
                    ads[name].gasto += parseFloat(v.toString().replace(/[^0-9.]/g, '')) || 0;
                });
                dMonitor.forEach(lead => {
                    const f = new Date(lead.lastMessageDate);
                    if(f < fi || f > ff) return;
                    const ad = Object.keys(ads).find(n => n.includes(lead.adName) || n === lead.adName) || 'Otros';
                    if(!ads[ad]) ads[ad] = { gasto:0, leads:0, fugas:0, asistidas:0 };
                    ads[ad].leads++;
                    const num = cleanNum(lead.number);
                    const cita = dReservo.find(c => cleanNum(c['Teléfono']) === num);
                    if(cita && (cita['Estado de la cita'] === 'Asiste' || cita['Estado de la cita'] === 'Realizado')) {
                        ads[ad].asistidas++;
                    } else if(lead.status === 'HOT') {
                        ads[ad].fugas++;
                    }
                });
                const cuerpo = document.getElementById('cuerpo-ads');
                cuerpo.innerHTML = '';
                let tG, tL, tA; tG=tL=tA=0;
                Object.keys(ads).forEach(n => {
                    const a = ads[n]; if(a.gasto === 0 && a.leads === 0) return;
                    const cac = a.asistidas > 0 ? (a.gasto / a.asistidas) : a.gasto;
                    tG += a.gasto; tL += a.leads; tA += a.asistidas;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td><b>${n}</b></td><td>${a.gasto.toLocaleString('es-CL',{style:'currency',currency:'CLP'})}</td><td>${a.leads}</td><td><span class="${a.fugas>0?'fuga-badge':''}">${a.fugas}</span></td><td>${a.asistidas}</td><td style="font-weight:bold;color:${cac<10000?'#16a34a':'#dc2626'}">${cac.toLocaleString('es-CL',{style:'currency',currency:'CLP'})}</td>`;
                    cuerpo.appendChild(tr);
                });
                document.getElementById('mGasto').innerText = tG.toLocaleString('es-CL',{style:'currency',currency:'CLP'});
                document.getElementById('mLeads').innerText = tL;
                document.getElementById('mAsist').innerText = tA;
                const cacT = tA > 0 ? (tG / tA) : tG;
                document.getElementById('mCac').innerText = cacT.toLocaleString('es-CL',{style:'currency',currency:'CLP'});
                document.getElementById('resumen').style.display = 'grid';
                document.getElementById('analisis-anuncios').style.display = 'block';
            } catch (err) { alert('Fallo: ' + err.message); }
            finally { document.getElementById('btn-procesar').disabled = false; document.getElementById('loader').style.display = 'none'; }
        }
    </script>
</body>
</html>
