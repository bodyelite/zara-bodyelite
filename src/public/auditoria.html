<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Auditoría Zara 7.0</title>
<style>
body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; }
.container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
h1 { color: #333; font-size: 24px; text-transform: uppercase; }
input[type="file"] { margin: 10px 0; display: block; }
button { background: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; margin-top: 15px; }
button:hover { background: #218838; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
th { background-color: #111; color: white; }
</style>
</head>
<body>
<div class="container">
<h1>Auditoría Meta Ads vs Reservo</h1>
<label>1. Sube el CSV de Meta Ads:</label>
<input type="file" id="fileMeta" accept=".csv">
<label>2. Sube el Excel/CSV de Reservo:</label>
<input type="file" id="fileReservo" accept=".csv">
<button onclick="procesarArchivos()">Cruzar Datos y Calcular CAC Real</button>
<div id="resultados"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/papaparse/5.3.2/papaparse.min.js"></script>
<script>
async function procesarArchivos() {
    const fileMeta = document.getElementById('fileMeta').files[0];
    const fileReservo = document.getElementById('fileReservo').files[0];
    const resDiv = document.getElementById('resultados');

    if (!fileMeta || !fileReservo) {
        alert('Subí ambos archivos, no seas boludo.');
        return;
    }

    resDiv.innerHTML = '<p>Procesando con perfección suiza... ⏳</p>';

    const leerCSV = (file) => {
        return new Promise((resolve) => {
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: (results) => resolve(results.data)
            });
        });
    };

    const dataMeta = await leerCSV(fileMeta);
    const dataReservo = await leerCSV(fileReservo);

    // Lógica de cruce simplificada (por nombre o teléfono si coinciden las columnas)
    let gastoTotal = 0;
    dataMeta.forEach(row => {
        const valor = parseFloat(row['Importe gastado (CLP)']) || parseFloat(row['Amount spent']) || 0;
        gastoTotal += valor;
    });

    const citasConfirmadas = dataReservo.length;
    const cac = citasConfirmadas > 0 ? (gastoTotal / citasConfirmadas) : 0;

    resDiv.innerHTML = `
        <div style="margin-top:20px; padding:15px; border:2px solid #28a745; border-radius:8px;">
            <h3 style="margin-top:0">📊 Resultado de la Auditoría</h3>
            <p><b>Inversión Total Meta:</b> ${gastoTotal.toLocaleString('es-CL', {style:'currency', currency:'CLP'})}</p>
            <p><b>Citas en Reservo:</b> ${citasConfirmadas}</p>
            <hr>
            <h2 style="color:#28a745">CAC Real: ${cac.toLocaleString('es-CL', {style:'currency', currency:'CLP'})} por cita</h2>
        </div>
    `;
}
</script>
</body>
</html>
