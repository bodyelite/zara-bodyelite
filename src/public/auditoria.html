<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Auditoría Estratégica Body Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 20px; color: #1e293b; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; background: #f1f5f9; padding: 20px; border-radius: 12px; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { background: #2563eb; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        #loader { display: none; font-weight: bold; color: #2563eb; margin-bottom: 10px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; font-size: 12px; }
        th { background: #334155; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
        .hot { background: #fee2e2; color: #991b1b; padding: 2px 5px; border-radius: 4px; font-weight: bold; }
        .fuga { background: #fff7ed; border: 1px solid #fb923c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ Altar de Números: Auditoría de Conversión</h1>
        <div class="config-grid">
            <div><label>Desde:</label><input type="date" id="fi" value="2026-03-01"></div>
            <div><label>Hasta:</label><input type="date" id="ff" value="2026-03-31"></div>
            <div><label>Meta (Excel):</label><input type="file" id="fm"></div>
            <div><label>Reservo (Excel):</label><input type="file" id="fr"></div>
        </div>
        <div id="loader">⚙️ Procesando con Perfección Suiza...</div>
        <button id="btn" onclick="analizar()">EJECUTAR AUDITORÍA</button>
        <div id="dash" style="display:none; margin-top:30px;">
            <div id="resumen" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; margin-bottom:20px; font-weight:bold; text-align:center;"></div>
            <table>
                <thead>
                    <tr>
                        <th>Lead</th>
                        <th>Estado</th>
                        <th>Origen</th>
                        <th>Bitácora</th>
                        <th>Reservo</th>
                        <th>Resultado</th>
                    </tr>
                </thead>
                <tbody id="cuerpo"></tbody>
            </table>
        </div>
    </div>
    <script>
        const clean = (n) => String(n).replace(/\D/g,'').slice(-8);
        async function read(f) {
            return new Promise(r => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                    r(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
                };
                reader.readAsArrayBuffer(f);
            });
        }
        async function analizar() {
            const fm = document.getElementById('fm').files[0];
            const fr = document.getElementById('fr').files[0];
            if(!fm || !fr) return alert('Subí los archivos.');
            
            document.getElementById('btn').disabled = true;
            document.getElementById('loader').style.display = 'block';

            try {
                const [dMeta, dReservo, dMonitor] = await Promise.all([
                    read(fm), read(fr), fetch('/api/data').then(res => res.json()).catch(() => [])
                ]);

                let gasto = 0;
                dMeta.forEach(row => {
                    let v = row['Importe gastado (CLP)'] || row['Amount spent'] || 0;
                    gasto += parseFloat(v.toString().replace(/[^0-9.]/g, '')) || 0;
                });

                const fi = new Date(document.getElementById('fi').value);
                const ff = new Date(document.getElementById('ff').value);
                const cuerpo = document.getElementById('cuerpo');
                cuerpo.innerHTML = '';
                let asistencias = 0;

                dMonitor.forEach(lead => {
                    const f = new Date(lead.lastMessageDate);
                    if(f < fi || f > ff) return;

                    const num = clean(lead.number);
                    const cita = dReservo.find(c => clean(c['Teléfono'] || '') === num);
                    const esAsist = cita && (cita['Estado de la cita'] === 'Asiste' || cita['Estado de la cita'] === 'Realizado');
                    if(esAsist) asistencias++;

                    const row = document.createElement('tr');
                    const esFuga = !cita && lead.status === 'HOT';
                    if(esFuga) row.className = 'fuga';

                    row.innerHTML = `
                        <td><b>${lead.name}</b><br>${lead.number}</td>
                        <td><span class="${lead.status === 'HOT' ? 'hot' : ''}">${lead.status}</span></td>
                        <td>${lead.adName || lead.firstMessage || '-'}</td>
                        <td>${lead.notes || 'Sin notas'}</td>
                        <td>${cita ? '✅ ' + cita['Estado de la cita'] : '❌ No figura'}</td>
                        <td><b>${esAsist ? 'LOGRADO' : (esFuga ? 'FUGA CALIENTE' : 'SEGUIMIENTO')}</b></td>
                    `;
                    cuerpo.appendChild(row);
                });

                const cac = asistencias > 0 ? (gasto / asistencias) : gasto;
                document.getElementById('resumen').innerHTML = `
                    <div style="background:#f1f5f9; padding:15px; border-radius:10px;">Gasto: ${gasto.toLocaleString('es-CL',{style:'currency',currency:'CLP'})}</div>
                    <div style="background:#f1f5f9; padding:15px; border-radius:10px;">Asistidas: ${asistencias}</div>
                    <div style="background:#dcfce7; padding:15px; border-radius:10px; color:#166534;">CAC REAL: ${cac.toLocaleString('es-CL',{style:'currency',currency:'CLP'})}</div>
                `;
                document.getElementById('dash').style.display = 'block';
            } catch (err) { alert('Error: ' + err.message); }
            finally { 
                document.getElementById('btn').disabled = false; 
                document.getElementById('loader').style.display = 'none'; 
            }
        }
    </script>
</body>
</html>
