<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Auditoría Zara 7.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .upload { margin-bottom: 20px; border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
        button { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .res { margin-top: 20px; padding: 20px; border-radius: 10px; background: #f0fff4; border: 2px solid #28a745; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Auditoría Body Elite (Excel/CSV)</h1>
        <div class="upload">
            <label>1. Meta Ads (Inversión):</label>
            <input type="file" id="fMeta">
        </div>
        <div class="upload">
            <label>2. Reservo (Citas):</label>
            <input type="file" id="fReservo">
        </div>
        <div class="upload">
            <label>Desde:</label> <input type="date" id="fechaInicio" value="2026-03-01">
            <label>Hasta:</label> <input type="date" id="fechaFin" value="2026-03-31">
        </div>
        <button onclick="procesar()">Calcular CAC Quirúrgico</button>
        <div id="resultados" class="res"></div>
    </div>

    <script>
        async function leerExcel(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    resolve(XLSX.utils.sheet_to_json(sheet));
                };
                reader.readAsArrayBuffer(file);
            });
        }

        async function procesar() {
            const fm = document.getElementById('fMeta').files[0];
            const fr = document.getElementById('fReservo').files[0];
            const inicio = new Date(document.getElementById('fechaInicio').value);
            const fin = new Date(document.getElementById('fechaFin').value);

            if (!fm || !fr) return alert('Subí los archivos, boludo.');

            const dMeta = await leerExcel(fm);
            const dReservo = await leerExcel(fr);

            let gasto = 0;
            dMeta.forEach(r => {
                let v = r['Importe gastado (CLP)'] || r['Amount spent'] || 0;
                gasto += parseFloat(v.toString().replace(/[^0-9.]/g, '')) || 0;
            });

            const efectivas = dReservo.filter(c => {
                const fCita = new Date(c['Fecha']);
                const asiste = c['Estado de la cita'] === 'Asiste' || c['Estado de la cita'] === 'Realizado';
                return asiste && fCita >= inicio && fCita <= fin;
            }).length;

            const cac = efectivas > 0 ? (gasto / efectivas) : gasto;
            const res = document.getElementById('resultados');
            res.style.display = 'block';
            res.innerHTML = `
                <h2>Veredicto</h2>
                <p>💰 Inversión: ${gasto.toLocaleString('es-CL', {style:'currency', currency:'CLP'})}</p>
                <p>✅ Citas (${efectivas}): Personas que pisaron la clínica en el rango.</p>
                <hr>
                <h1 style="color:#28a745">CAC REAL: ${cac.toLocaleString('es-CL', {style:'currency', currency:'CLP'})}</h1>
            `;
        }
    </script>
</body>
</html>
