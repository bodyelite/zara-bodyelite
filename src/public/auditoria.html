<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Estratégico Body Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 20px; color: #0f172a; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .header { border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .config-bar { background: #f8fafc; padding: 20px; border-radius: 10px; margin-bottom: 25px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; border: 1px solid #e2e8f0; }
        .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; border: 1px solid #e2e8f0; text-align: center; }
        .card h3 { font-size: 14px; color: #64748b; margin: 0; text-transform: uppercase; }
        .card p { font-size: 24px; font-weight: bold; margin: 10px 0 0; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; font-size: 13px; }
        th { background: #1e293b; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        tr:hover { background: #f8fafc; }
        .fuga-badge { background: #fee2e2; color: #991b1b; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; }
        button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ Altar de Números: Auditoría Body Elite</h1>
            <button onclick="procesar()">EJECUTAR ANÁLISIS QUIRÚRGICO</button>
        </div>

        <div class="config-bar">
            <div><label>Desde:</label><input type="date" id="fi" value="2026-03-01"></div>
            <div><label>Hasta:</label><input type="date" id="ff" value="2026-03-31"></div>
            <div><label>Reporte Meta:</label><input type="file" id="fm"></div>
            <div><label>Reporte Reservo:</label><input type="file" id="fr"></div>
        </div>

        <div id="resumen" class="metric-grid" style="display:none;">
            <div class="card"><h3>Inversión</h3><p id="mGasto">$0</p></div>
            <div class="card"><h3>Leads Totales</h3><p id="mLeads">0</p></div>
            <div class="card"><h3>Asistidas</h3><p id="mAsist">0</p></div>
            <div class="card"><h3>CAC Real</h3><p id="mCac" style="color:#16a34a;">$0</p></div>
        </div>

        <div id="analisis-anuncios" style="display:none;">
            <h2>Análisis de Rendimiento por Anuncio</h2>
            <table>
                <thead>
                    <tr>
                        <th>Nombre del Anuncio</th>
                        <th>Gasto CLP</th>
                        <th>Leads Zara</th>
                        <th>Fugas (HOT s/Cita)</th>
                        <th>Asistidas (Reservo)</th>
                        <th>CAC por Anuncio</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-ads"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function leer(f) {
            return new Promise(r => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                    r(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
                };
                reader.readAsArrayBuffer(f);
            });
        }

        async function procesar() {
            const fm = document.getElementById('fm').files[0];
            const fr = document.getElementById('fr').files[0];
            if(!fm || !fr) return alert('Subí los archivos.');

            const dMeta = await leer(fm);
            const dReservo = await leer(fr);
            const resApi = await fetch('/api/data');
            const dMonitor = await resApi.json();

            let ads = {};

            // 1. Procesar Meta
            dMeta.forEach(row => {
                const name = row['Nombre del anuncio'] || row['Ad Name'] || 'Desconocido';
                const gasto = parseFloat(row['Importe gastado (CLP)'] || row['Amount spent'] || 0);
                if(!ads[name]) ads[name] = { gasto: 0, leads: 0, fugas: 0, asistidas: 0 };
                ads[name].gasto += gasto;
            });

            // 2. Procesar Monitor y Cruce
            dMonitor.forEach(lead => {
                const f = new Date(lead.lastMessageDate);
                // Vinculación por frase de entrada o nombre de anuncio si existe
                const adName = Object.keys(ads).find(n => n.includes(lead.adName) || n === lead.adName) || 'Otros';
                if(!ads[adName]) ads[adName] = { gasto: 0, leads: 0, fugas: 0, asistidas: 0 };
                
                ads[adName].leads++;
                
                const num = lead.number.replace(/\D/g,'').slice(-8);
                const cita = dReservo.find(c => String(c['Teléfono']).replace(/\D/g,'').includes(num));
                
                if(cita && (cita['Estado de la cita'] === 'Asiste' || cita['Estado de la cita'] === 'Realizado')) {
                    ads[adName].asistidas++;
                } else if(lead.status === 'HOT') {
                    ads[adName].fugas++;
                }
            });

            // 3. Renderizar Tabla
            const cuerpo = document.getElementById('cuerpo-ads');
            cuerpo.innerHTML = '';
            let tGasto = 0, tLeads = 0, tAsist = 0;

            Object.keys(ads).forEach(name => {
                const a = ads[name];
                const cac = a.asistidas > 0 ? (a.gasto / a.asistidas) : a.gasto;
                tGasto += a.gasto; tLeads += a.leads; tAsist += a.asistidas;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${name}</b></td>
                    <td>${a.gasto.toLocaleString('es-CL', {style:'currency', currency:'CLP'})}</td>
                    <td>${a.leads}</td>
                    <td><span class="${a.fugas > 0 ? 'fuga-badge' : ''}">${a.fugas}</span></td>
                    <td>${a.asistidas}</td>
                    <td style="font-weight:bold; color:${cac < 10000 ? '#16a34a' : '#dc2626'}">${cac.toLocaleString('es-CL', {style:'currency', currency:'CLP'})}</td>
                `;
                cuerpo.appendChild(tr);
            });

            document.getElementById('mGasto').innerText = tGasto.toLocaleString('es-CL', {style:'currency', currency:'CLP'});
            document.getElementById('mLeads').innerText = tLeads;
            document.getElementById('mAsist').innerText = tAsist;
            const cacTotal = tAsist > 0 ? (tGasto / tAsist) : tGasto;
            document.getElementById('mCac').innerText = cacTotal.toLocaleString('es-CL', {style:'currency', currency:'CLP'});

            document.getElementById('resumen').style.display = 'grid';
            document.getElementById('analisis-anuncios').style.display = 'block';
        }
    </script>
</body>
</html>
