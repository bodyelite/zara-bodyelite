<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AUDITORÍA PRO BODY ELITE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'SF Mono', monospace; background: #0f172a; color: #f8fafc; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: #1e293b; padding: 30px; border-radius: 8px; border: 1px solid #334155; }
        .box { background: #0f172a; padding: 20px; border-radius: 6px; border: 1px solid #334155; margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; background: #1e293b; border: 1px solid #334155; color: #38bdf8; padding: 12px; border-radius: 4px; box-sizing: border-box; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 15px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 16px; transition: 0.2s; }
        button:hover { background: #0ea5e9; }
        .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 30px 0; }
        .card { background: #0f172a; padding: 20px; border: 1px solid #334155; text-align: center; border-radius: 6px; }
        .card h3 { font-size: 11px; color: #94a3b8; margin: 0; }
        .card p { font-size: 24px; margin: 10px 0 0; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 20px; }
        th { background: #334155; color: #38bdf8; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #334155; }
        .fuga { color: #f43f5e; font-weight: bold; }
        .logrado { color: #10b981; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ ALTAR DE NÚMEROS: AUDITORÍA EN RENDER</h1>
        
        <div class="box">
            <div class="grid-2">
                <div><label>DESDE (Fecha de ingreso del Lead)</label><input type="date" id="fi" value="2026-03-01"></div>
                <div><label>HASTA</label><input type="date" id="ff" value="2026-03-31"></div>
            </div>
            <div class="grid-3">
                <div><label>1. META (EXCEL)</label><input type="file" id="fm" accept=".xlsx,.xls,.csv"></div>
                <div><label>2. RESERVO (EXCEL)</label><input type="file" id="fr" accept=".xlsx,.xls,.csv"></div>
                <div><label>3. MONITOR (JSON)</label><input type="file" id="fz" accept=".json"></div>
            </div>
        </div>

        <button onclick="auditar()">EJECUTAR CRUCE QUIRÚRGICO</button>

        <div id="res" style="display:none;">
            <div class="metric-grid" id="kpis"></div>
            <table>
                <thead><tr><th>FECHA</th><th>LEAD</th><th>ESTADO (ZARA)</th><th>RESERVO</th><th>VEREDICTO</th></tr></thead>
                <tbody id="cuerpo"></tbody>
            </table>
        </div>
    </div>
    <script>
        const clean = (n) => String(n || '').replace(/\D/g,'').slice(-8);
        async function rx(f) { return new Promise(r => { const reader = new FileReader(); reader.onload = (e) => r(XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).SheetNames[0]])); reader.readAsArrayBuffer(f); }); }
        async function rj(f) { return new Promise(r => { const reader = new FileReader(); reader.onload = (e) => r(JSON.parse(e.target.result)); reader.readAsText(f); }); }
        
        async function auditar() {
            const fm = document.getElementById('fm').files[0], fr = document.getElementById('fr').files[0], fz = document.getElementById('fz').files[0];
            if(!fm || !fr || !fz) return alert('Faltan archivos en el altar. Subí los 3.');
            
            const fi = new Date(document.getElementById('fi').value + 'T00:00:00').getTime();
            const ff = new Date(document.getElementById('ff').value + 'T23:59:59').getTime();
            
            const [meta, reser, monRaw] = await Promise.all([rx(fm), rx(fr), rj(fz)]);
            
            let gasto = 0;
            meta.forEach(r => { gasto += parseFloat(String(r['Importe gastado (CLP)'] || r['Amount spent'] || 0).replace(/[^0-9.]/g, '')) || 0; });
            
            const usersObj = monRaw.users || monRaw || {};
            const usersArr = Array.isArray(usersObj) ? usersObj : Object.values(usersObj);
            
            const cuerpo = document.getElementById('cuerpo'); cuerpo.innerHTML = '';
            let asist = 0;
            let leadsRango = 0;
            
            usersArr.forEach(l => {
                let ts = l.lastInteraction || 0;
                if(l.history && l.history.length > 0) { ts = l.history[0].timestamp || ts; }
                
                if(ts < fi || ts > ff) return;
                
                leadsRango++;
                const num = clean(l.phone || l.number);
                const cita = reser.find(c => clean(c['Teléfono']) === num);
                const esA = cita && (cita['Estado de la cita'] === 'Asiste' || cita['Estado de la cita'] === 'Realizado');
                if(esA) asist++;
                
                const tr = document.createElement('tr');
                const esF = !cita && (l.tag === 'HOT' || l.status === 'HOT');
                const fechaStr = new Date(ts).toLocaleDateString('es-CL');
                
                tr.innerHTML = `<td>${fechaStr}</td><td>${l.name}<br><small>${l.phone || ''}</small></td><td>${l.tag || l.status || '-'}</td><td>${cita ? cita['Estado de la cita'] : '❌'}</td><td class="${esA ? 'logrado' : (esF ? 'fuga' : '')}">${esA ? 'LOGRADO' : (esF ? 'FUGA HOT' : 'SEGUIMIENTO')}</td>`;
                cuerpo.appendChild(tr);
            });
            
            const cac = asist > 0 ? (gasto / asist) : gasto;
            document.getElementById('kpis').innerHTML = `<div class="card"><h3>INVERSIÓN META</h3><p>${gasto.toLocaleString('es-CL',{style:'currency',currency:'CLP'})}</p></div><div class="card"><h3>LEADS EN RANGO</h3><p>${leadsRango}</p></div><div class="card"><h3>ASISTIDAS (RESERVO)</h3><p>${asist}</p></div><div class="card"><h3 style="color:#10b981">CAC REAL</h3><p style="color:#10b981">${cac.toLocaleString('es-CL',{style:'currency',currency:'CLP'})}</p></div>`;
            document.getElementById('res').style.display = 'block';
        }
    </script>
</body>
</html>
