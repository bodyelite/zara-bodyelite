<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RADAR DE PRECISIÓN CEO - BODY ELITE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'SF Mono', monospace; background: #0f172a; color: #f8fafc; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        .box { background: #1e293b; padding: 20px; border-radius: 6px; border: 1px solid #334155; margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        input[type="date"], input[type="file"] { width: 100%; background: #0f172a; border: 1px solid #334155; color: #38bdf8; padding: 12px; border-radius: 4px; margin-bottom: 10px; box-sizing: border-box; }
        button { background: #10b981; color: #0f172a; border: none; padding: 15px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 16px; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; background: #0f172a; text-align: center; }
        th { background: #334155; color: #38bdf8; padding: 12px; border-bottom: 2px solid #1e293b; font-size: 11px; }
        td { padding: 14px; border-bottom: 1px solid #1e293b; }
        .win { color: #10b981; font-weight: bold; }
        .money { color: #fbbf24; font-weight: bold; }
        .text-left { text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: #38bdf8;">🎯 ANÁLISIS DESDE EL ORIGEN (META -> ZARA -> RESERVO)</h1>
        <div class="box">
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                <div><label>1. Excel Meta (Anuncios)</label><input type="file" id="fm" accept=".csv, .xlsx, .xls"></div>
                <div><label>2. JSON Zara (Monitor)</label><input type="file" id="fz" accept=".json"></div>
                <div><label>3. Reservo (Caja)</label><input type="file" id="fr" accept=".xlsx,.xls,.csv"></div>
            </div>
            <button onclick="ejecutarRadar()">CALCULAR RETORNO REAL</button>
        </div>

        <div id="res" style="display:none;">
            <table>
                <thead>
                    <tr>
                        <th class="text-left">ANUNCIO (META)</th>
                        <th>INVERSIÓN ($)</th>
                        <th>CHATS EN META</th>
                        <th>CHATS EN ZARA</th>
                        <th>AVANZAN (>4 MSJS)</th>
                        <th>AGENDAN (ZARA)</th>
                        <th style="background:#1e293b">LLEGARON (RESERVO)</th>
                        <th>CAC FINAL</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>
    </div>

    <script>
        const clean = (n) => String(n || '').replace(/\D/g,'').slice(-8);
        const fmtMoney = (n) => new Intl.NumberFormat('es-CL', {style:'currency', currency:'CLP'}).format(n);

        // MAPEO MANUAL: El nombre exacto de tu anuncio en Meta -> Frase que dispara en WhatsApp
        const MAPEO = {
            "lipo fran": "quiero agendar mi evaluación diagnóstica lipo",
            "facial pia": "hola, quiero agendar diagnostico facial",
            "rostro verano": "quiero mi evaluación rostro"
        };

        async function rxArray(f) { return new Promise(r => { const reader = new FileReader(); reader.onload = (e) => r(XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).SheetNames[0]], {header: 1})); reader.readAsArrayBuffer(f); }); }
        async function rj(f) { return new Promise(r => { const reader = new FileReader(); reader.onload = (e) => r(JSON.parse(e.target.result)); reader.readAsText(f); }); }
        
        async function ejecutarRadar() {
            const fm = document.getElementById('fm').files[0], fz = document.getElementById('fz').files[0], fr = document.getElementById('fr').files[0];
            if(!fm || !fz || !fr) return alert('Sube los 3 archivos.');
            
            const [metaArr, monRaw, reserArr] = await Promise.all([rxArray(fm), rj(fz), rxArray(fr)]);
            const leadsZara = Array.isArray(monRaw.users) ? monRaw.users : Object.values(monRaw.users || {});
            
            // Procesar Reservo
            const reserHeaders = reserArr[0] || [];
            let cTelR = reserHeaders.findIndex(h => String(h).toLowerCase().includes('tel') || String(h).toLowerCase().includes('celular'));
            let cNomR = reserHeaders.findIndex(h => String(h).toLowerCase().includes('paciente') || String(h).toLowerCase().includes('nombre'));
            const reserData = reserArr.slice(1).map(row => ({
                tel: clean(row[cTelR]),
                nom: String(row[cNomR] || '').toLowerCase(),
                est: String(row[13] || row[2] || '').toLowerCase()
            }));

            // Procesar Meta y buscar en los otros mundos
            const metaH = metaArr[0] || [];
            let cAnuncio = metaH.findIndex(h => String(h).toLowerCase().includes('anuncio') || String(h).toLowerCase().includes('ad name'));
            let cGasto = metaH.findIndex(h => String(h).toLowerCase().includes('importe gastado') || String(h).toLowerCase().includes('spent'));
            let cRes = metaH.findIndex(h => String(h).toLowerCase() === 'resultados' || String(h).toLowerCase().includes('results'));

            let tablaHtml = "";

            metaArr.slice(1).forEach(row => {
                let nombreAnuncio = String(row[cAnuncio] || '').toLowerCase().trim();
                let inversion = parseFloat(row[cGasto]) || 0;
                let resultadosMeta = parseInt(row[cRes]) || 0;

                if (inversion <= 0) return;

                // Buscar frase asociada en el mapa
                let fraseAsociada = MAPEO[nombreAnuncio] || null;
                
                let countZara = 0, countAvanzan = 0, countAgendan = 0, countLlegaron = 0;

                if (fraseAsociada) {
                    const leadsDeEsteAnuncio = leadsZara.filter(l => l.history?.[0]?.content.toLowerCase().includes(fraseAsociada));
                    countZara = leadsDeEsteAnuncio.length;

                    leadsDeEsteAnuncio.forEach(l => {
                        // 1. Avanzan (>4 msjs o tag)
                        if (l.history?.length >= 5 || l.tag === 'HOT' || l.tag === 'INTERESADO') countAvanzan++;
                        
                        // 2. Agendan (Tag o Bitácora)
                        let agendo = l.tag === 'AGENDADO' || l.notes?.some(n => n.text.toLowerCase().includes('agenda'));
                        if (agendo) {
                            countAgendan++;
                            // 3. Llegaron (Reservo)
                            let p = clean(l.phone), n = String(l.name || '').toLowerCase().split(' ')[0];
                            let match = reserData.filter(c => (p.length >= 8 && c.tel.includes(p)) || (n.length > 3 && c.nom.includes(n)));
                            if (match.some(c => c.est.includes('asiste') || c.est.includes('realizado') || c.est.includes('atendid') || c.est.includes('ok'))) {
                                countLlegaron++;
                            }
                        }
                    });
                }

                let cac = countLlegaron > 0 ? fmtMoney(inversion / countLlegaron) : (inversion > 0 ? "PÉRDIDA" : "---");

                tablaHtml += `<tr>
                    <td class="text-left"><b>${nombreAnuncio.toUpperCase()}</b></td>
                    <td class="money">${fmtMoney(inversion)}</td>
                    <td>${resultadosMeta}</td>
                    <td>${countZara}</td>
                    <td class="win">${countAvanzan}</td>
                    <td>${countAgendan}</td>
                    <td style="background:#1e293b; font-weight:bold; color:#10b981;">${countLlegaron}</td>
                    <td class="win">${cac}</td>
                </tr>`;
            });

            document.getElementById('cuerpoTabla').innerHTML = tablaHtml;
            document.getElementById('res').style.display = 'block';
        }
    </script>
</body>
</html>
