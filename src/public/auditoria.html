<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Auditoría Estratégica Body Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 20px; color: #1e293b; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; background: #f1f5f9; padding: 20px; border-radius: 12px; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { background: #2563eb; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; font-size: 12px; }
        th { background: #334155; color: white; padding: 12px; text-align: left; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
        .status-badge { padding: 3px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .hot { background: #fee2e2; color: #991b1b; }
        .fuga { background: #fff7ed; border: 1px solid #fb923c; color: #9a3412; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ Auditoría de Conversión Estratégica</h1>
        <div class="config-grid">
            <div><label>Desde:</label><input type="date" id="fechaInicio" value="2026-03-01"></div>
            <div><label>Hasta:</label><input type="date" id="fechaFin" value="2026-03-31"></div>
            <div><label>Meta (Excel):</label><input type="file" id="fileMeta"></div>
            <div><label>Reservo (Excel):</label><input type="file" id="fileReservo"></div>
        </div>
        <button onclick="ejecutarAuditoria()">AUDITAR AHORA</button>
        <div id="dashboard" style="display:none;">
            <table id="tabla-maestra">
                <thead>
                    <tr>
                        <th>Lead (Monitor)</th>
                        <th>Estado</th>
                        <th>Origen (Frase)</th>
                        <th>Bitácora</th>
                        <th>Reservo</th>
                        <th>Veredicto</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla"></tbody>
            </table>
        </div>
    </div>
    <script>
        async function leerExcel(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                    resolve(XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]));
                };
                reader.readAsArrayBuffer(file);
            });
        }
        async function ejecutarAuditoria() {
            const fm = document.getElementById('fileMeta').files[0];
            const fr = document.getElementById('fileReservo').files[0];
            const inicio = new Date(document.getElementById('fechaInicio').value);
            const fin = new Date(document.getElementById('fechaFin').value);
            if (!fm || !fr) return alert('Subí los archivos.');
            try {
                const resApi = await fetch('/api/data');
                const dataMonitor = await resApi.json();
                const dMeta = await leerExcel(fm);
                const dReservo = await leerExcel(fr);
                const tabla = document.getElementById('cuerpo-tabla');
                tabla.innerHTML = '';
                dataMonitor.forEach(lead => {
                    const fUltima = new Date(lead.lastMessageDate);
                    if (fUltima < inicio || fUltima > fin) return;
                    const numLimpio = lead.number.replace(/\D/g,'').slice(-8);
                    const cita = dReservo.find(c => String(c['Teléfono']).replace(/\D/g,'').includes(numLimpio));
                    const row = document.createElement('tr');
                    const esAgendado = !!cita;
                    const esFuga = !esAgendado && lead.status === 'HOT';
                    if (esFuga) row.className = 'fuga';
                    row.innerHTML = `
                        <td><b>${lead.name}</b><br>${lead.number}</td>
                        <td><span class="status-badge ${lead.status.toLowerCase()}">${lead.status}</span></td>
                        <td>${lead.firstMessage || '-'}</td>
                        <td style="font-size:10px;">${lead.notes || 'Sin notas'}</td>
                        <td>${esAgendado ? '✅ ' + cita['Estado de la cita'] : '❌ No figura'}</td>
                        <td><b>${esAgendado ? 'LOGRADO' : (esFuga ? 'FUGA CALIENTE' : 'SEGUIMIENTO')}</b></td>
                    `;
                    tabla.appendChild(row);
                });
                document.getElementById('dashboard').style.display = 'block';
            } catch (err) {
                console.error(err);
                alert('Error al procesar. Revisá la consola.');
            }
        }
    </script>
</body>
</html>
