<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AUDITORÍA PRO: CERO ESTUPIDEZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'SF Mono', monospace; background: #0f172a; color: #f8fafc; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: #1e293b; padding: 30px; border-radius: 8px; border: 1px solid #334155; }
        .box { background: #0f172a; padding: 20px; border-radius: 6px; border: 1px solid #334155; margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 5px; font-weight: bold; }
        input[type="date"], input[type="file"] { width: 100%; background: #1e293b; border: 1px solid #334155; color: #38bdf8; padding: 12px; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; }
        button { background: #f43f5e; color: #fff; border: none; padding: 15px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 16px; transition: 0.2s; border-radius: 4px; }
        button:hover { background: #e11d48; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 20px; background: #0f172a; }
        th { background: #334155; color: #38bdf8; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #334155; vertical-align: top; }
        .win { color: #10b981; font-weight: bold; }
        .lose { color: #f43f5e; font-weight: bold; }
        .challa { color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔪 LA VERDAD CRUDA (POR FRASE DE META)</h1>
        
        <div class="box">
            <div class="grid-2">
                <div><label>DESDE</label><input type="date" id="fi" value="2026-03-01"></div>
                <div><label>HASTA</label><input type="date" id="ff" value="2026-03-31"></div>
            </div>
            <label>1. RESERVO (EXCEL DE CITAS)</label><input type="file" id="fr" accept=".xlsx,.xls,.csv">
            <label>2. MONITOR ZARA (JSON DE VERDAD)</label><input type="file" id="fz" accept=".json">
        </div>

        <button onclick="ejecutarVerdad()">MOSTRARME LOS NÚMEROS REALES</button>

        <div id="res" style="display:none;">
            <table>
                <thead>
                    <tr>
                        <th>Frase Gatillo (El Anuncio Real)</th>
                        <th>Leads Entrantes</th>
                        <th>Calidad (Hot/Agenda/>2 Msg)</th>
                        <th>Agendados en Reservo</th>
                        <th>Asistidos Reales</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>
    </div>

    <script>
        const clean = (n) => String(n || '').replace(/\D/g,'').slice(-8);
        async function rx(f) { return new Promise(r => { const reader = new FileReader(); reader.onload = (e) => r(XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).SheetNames[0]])); reader.readAsArrayBuffer(f); }); }
        async function rj(f) { return new Promise(r => { const reader = new FileReader(); reader.onload = (e) => r(JSON.parse(e.target.result)); reader.readAsText(f); }); }
        
        async function ejecutarVerdad() {
            const fr = document.getElementById('fr').files[0], fz = document.getElementById('fz').files[0];
            if(!fr || !fz) return alert('Subí Reservo y el JSON de Zara. No te saltes pasos.');
            
            const fi = new Date(document.getElementById('fi').value + 'T00:00:00').getTime();
            const ff = new Date(document.getElementById('ff').value + 'T23:59:59').getTime();

            const [reser, monRaw] = await Promise.all([rx(fr), rj(fz)]);
            const usersObj = monRaw.users || monRaw || {};
            const leads = Array.isArray(usersObj) ? usersObj : Object.values(usersObj);
            
            const statsPorFrase = {};

            leads.forEach(l => {
                let ts = l.lastInteraction || 0;
                if(l.history && l.history.length > 0) { ts = l.history[0].timestamp || ts; }
                if(ts < fi || ts > ff) return; // Filtro estricto de fechas

                // Extraer la frase exacta que gatilló el bot
                let frase = "Sin frase inicial / Retargeting";
                if(l.history && l.history.length > 0) frase = l.history[0].content.trim();
                
                if(!statsPorFrase[frase]) statsPorFrase[frase] = { leads: 0, calidad: 0, agendados: 0, asistidos: 0 };
                const s = statsPorFrase[frase];
                
                s.leads++;
                
                // Definición de calidad: Está HOT, AGENDADO, o cruzó más de 2 mensajes con el bot
                if(l.tag === 'HOT' || l.tag === 'AGENDADO' || (l.history && l.history.length > 2)) s.calidad++;

                const num = clean(l.phone || l.number);
                const cita = reser.find(c => clean(c['Teléfono'] || c['Teléfonos']) === num);
                
                if(cita) {
                    s.agendados++;
                    const estadoCita = String(cita['Estado cita'] || cita['Estado de la cita']).toLowerCase();
                    if(estadoCita.includes('asiste') || estadoCita.includes('realizado') || estadoCita.includes('atendido')) {
                        s.asistidos++;
                    }
                }
            });

            const cuerpo = document.getElementById('cuerpoTabla'); cuerpo.innerHTML = '';

            // Ordenar por volumen de leads para ver la basura primero y el oro después
            const frasesOrdenadas = Object.keys(statsPorFrase).sort((a,b) => statsPorFrase[b].leads - statsPorFrase[a].leads);

            frasesOrdenadas.forEach(f => {
                const s = statsPorFrase[f];
                cuerpo.innerHTML += `
                    <tr>
                        <td style="max-width:300px; font-weight:bold;">"${f}"</td>
                        <td>${s.leads}</td>
                        <td class="${s.calidad > 0 ? 'win' : 'challa'}">${s.calidad}</td>
                        <td class="${s.agendados > 0 ? 'win' : (s.leads > 0 ? 'lose' : '')}">${s.agendados}</td>
                        <td class="${s.asistidos > 0 ? 'win' : 'challa'}">${s.asistidos}</td>
                    </tr>
                `;
            });

            document.getElementById('res').style.display = 'block';
        }
    </script>
</body>
</html>
