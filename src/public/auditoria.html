<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AUDITORÍA ESTRATÉGICA BODY ELITE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'SF Mono', monospace; background: #0f172a; color: #f8fafc; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: #1e293b; padding: 30px; border-radius: 8px; border: 1px solid #334155; }
        .box { background: #0f172a; padding: 20px; border-radius: 6px; border: 1px solid #334155; margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; background: #1e293b; border: 1px solid #334155; color: #38bdf8; padding: 12px; border-radius: 4px; box-sizing: border-box; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 15px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 16px; transition: 0.2s; }
        button:hover { background: #0ea5e9; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 20px; background: #0f172a; }
        th { background: #334155; color: #38bdf8; padding: 12px; text-align: left; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #334155; }
        .win { color: #10b981; font-weight: bold; }
        .lose { color: #f43f5e; font-weight: bold; }
        .total-row { background: #1e293b; font-weight: bold; color: #38bdf8; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⛰️ LA MONTAÑA: FUNNEL POR ANUNCIO CON FILTRO TEMPORAL</h1>
        
        <div class="box">
            <div class="grid-2">
                <div><label>DESDE (Fecha de ingreso del Lead)</label><input type="date" id="fi" value="2026-03-01"></div>
                <div><label>HASTA</label><input type="date" id="ff" value="2026-03-31"></div>
            </div>
            <div class="grid-3">
                <div><label>1. META (EXCEL)</label><input type="file" id="fm" accept=".xlsx,.xls,.csv"></div>
                <div><label>2. RESERVO (EXCEL)</label><input type="file" id="fr" accept=".xlsx,.xls,.csv"></div>
                <div><label>3. MONITOR ZARA (JSON)</label><input type="file" id="fz" accept=".json"></div>
            </div>
        </div>

        <button onclick="auditarCerro()">CRUZAR DATOS Y SUBIR AL CERRO</button>

        <div id="res" style="display:none;">
            <table id="tablaCerro">
                <thead>
                    <tr>
                        <th>Anuncio (Meta)</th>
                        <th>Gasto Meta</th>
                        <th>Conv. Meta</th>
                        <th>Leads Reales (Zara)</th>
                        <th>Calidad (No Challa)</th>
                        <th>Agendados (Reservo)</th>
                        <th>Asistidos</th>
                        <th>CAC Asistido</th>
                    </tr>
                </thead>
                <tbody id="cuerpoCerro"></tbody>
            </table>
        </div>
    </div>

    <script>
        const clean = (n) => String(n || '').replace(/\D/g,'').slice(-8);
        async function rx(f) { return new Promise(r => { const reader = new FileReader(); reader.onload = (e) => r(XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).SheetNames[0]])); reader.readAsArrayBuffer(f); }); }
        async function rj(f) { return new Promise(r => { const reader = new FileReader(); reader.onload = (e) => r(JSON.parse(e.target.result)); reader.readAsText(f); }); }
        
        function guessAd(firstMsg) {
            const m = String(firstMsg).toLowerCase();
            if (m.includes('lipo')) return 'Lipo';
            if (m.includes('rostro') || m.includes('facial') || m.includes('tensor')) return 'Rostro/Facial';
            if (m.includes('gluteos') || m.includes('glúteos') || m.includes('push')) return 'Gluteos';
            return 'Otros/Video';
        }

        async function auditarCerro() {
            const fm = document.getElementById('fm').files[0], fr = document.getElementById('fr').files[0], fz = document.getElementById('fz').files[0];
            if(!fm || !fr || !fz) return alert('Señor de los números, faltan archivos para la magia.');
            
            const fi = new Date(document.getElementById('fi').value + 'T00:00:00').getTime();
            const ff = new Date(document.getElementById('ff').value + 'T23:59:59').getTime();

            const [meta, reser, monRaw] = await Promise.all([rx(fm), rx(fr), rj(fz)]);
            const usersObj = monRaw.users || monRaw || {};
            const leads = Array.isArray(usersObj) ? usersObj : Object.values(usersObj);
            
            const zaraStats = {};
            
            leads.forEach(l => {
                let ts = l.lastInteraction || 0;
                if(l.history && l.history.length > 0) { ts = l.history[0].timestamp || ts; }
                
                // EL FILTRO SUMERIO: Si el lead no está en la fecha, se ignora
                if(ts < fi || ts > ff) return;

                let firstMsg = '';
                if(l.history && l.history.length > 0) firstMsg = l.history[0].content;
                const adCat = guessAd(firstMsg);
                
                if(!zaraStats[adCat]) zaraStats[adCat] = { leads: 0, calidad: 0, agendados: 0, asistidos: 0 };
                zaraStats[adCat].leads++;
                
                if(l.tag === 'HOT' || l.tag === 'AGENDADO' || (l.history && l.history.length > 2)) zaraStats[adCat].calidad++;

                const num = clean(l.phone || l.number);
                const cita = reser.find(c => clean(c['Teléfono'] || c['Teléfonos']) === num);
                
                if(cita) {
                    zaraStats[adCat].agendados++;
                    const estadoCita = String(cita['Estado cita'] || cita['Estado de la cita']).toLowerCase();
                    if(estadoCita.includes('asiste') || estadoCita.includes('realizado') || estadoCita.includes('atendido')) {
                        zaraStats[adCat].asistidos++;
                    }
                }
            });

            const cuerpo = document.getElementById('cuerpoCerro'); cuerpo.innerHTML = '';
            let tGasto = 0, tMeta = 0, tZara = 0, tCal = 0, tAge = 0, tAsi = 0;

            meta.forEach(r => {
                const nombre = r['Nombre del anuncio'] || 'Desconocido';
                const gasto = parseFloat(String(r['Importe gastado (CLP)'] || 0).replace(/[^0-9.]/g, '')) || 0;
                const convMeta = parseFloat(r['Resultados']) || 0;
                if(gasto === 0 && convMeta === 0) return; 
                
                const adCat = guessAd(nombre); 
                const stats = zaraStats[adCat] || { leads: 0, calidad: 0, agendados: 0, asistidos: 0 };
                
                const leadsReales = stats.leads; 
                stats.leads = 0; 

                tGasto += gasto; tMeta += convMeta; tZara += leadsReales;
                tCal += stats.calidad; tAge += stats.agendados; tAsi += stats.asistidos;

                const cac = stats.asistidos > 0 ? (gasto / stats.asistidos) : 0;
                const cacStr = cac > 0 ? cac.toLocaleString('es-CL',{style:'currency',currency:'CLP'}) : '💀 SIN ASISTENCIA';

                cuerpo.innerHTML += `
                    <tr>
                        <td><strong>${nombre}</strong></td>
                        <td>${gasto.toLocaleString('es-CL',{style:'currency',currency:'CLP'})}</td>
                        <td>${convMeta}</td>
                        <td>${leadsReales}</td>
                        <td class="${stats.calidad > 0 ? 'win' : ''}">${stats.calidad}</td>
                        <td class="${stats.agendados > 0 ? 'win' : ''}">${stats.agendados}</td>
                        <td class="${stats.asistidos > 0 ? 'win' : 'lose'}">${stats.asistidos}</td>
                        <td class="${stats.asistidos > 0 ? 'win' : 'lose'}">${cacStr}</td>
                    </tr>
                `;
            });

            const tCac = tAsi > 0 ? (tGasto / tAsi) : 0;
            cuerpo.innerHTML += `
                <tr class="total-row">
                    <td>TOTALES (EL SILO)</td>
                    <td>${tGasto.toLocaleString('es-CL',{style:'currency',currency:'CLP'})}</td>
                    <td>${tMeta}</td>
                    <td>${tZara}</td>
                    <td>${tCal}</td>
                    <td>${tAge}</td>
                    <td>${tAsi}</td>
                    <td>${tCac.toLocaleString('es-CL',{style:'currency',currency:'CLP'})}</td>
                </tr>
            `;

            document.getElementById('res').style.display = 'block';
        }
    </script>
</body>
</html>
