<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BODY ELITE - CEO ANALYTICS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #060B14; --card: #111827; --border: #1F2937; --text: #F9FAFB; --muted: #9CA3AF; --green: #10B981; --red: #EF4444; --blue: #3B82F6; --alert: #F59E0B; --purple: #8B5CF6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px; }
        .container { max-width: 1600px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header h1 { margin: 0; font-weight: 900; font-size: 32px; color: var(--text); letter-spacing: -1px; text-transform: uppercase; }
        .header span { color: var(--blue); }
        .header-subtitle { color: var(--muted); font-size: 14px; font-weight: 600; margin-top: 5px; letter-spacing: 0.5px; }
        
        .upload-section { display: grid; grid-template-columns: repeat(3, 1fr) 200px; gap: 15px; background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 40px; align-items: end; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .upload-box label { display: block; font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .upload-box input { width: 100%; background: #000; border: 1px solid var(--border); color: var(--text); padding: 14px; border-radius: 8px; box-sizing: border-box; font-family: monospace; font-size: 12px; transition: border 0.3s; }
        .upload-box input:focus { border-color: var(--blue); outline: none; }
        
        .date-box { display: flex; gap: 15px; }
        .date-col label { display: block; font-size: 10px; font-weight: 800; color: var(--muted); margin-bottom: 5px; }
        .date-col input { background: #000; color: #fff; border: 1px solid var(--border); padding: 10px 15px; border-radius: 8px; font-family: monospace; font-size: 14px; }
        
        .btn { background: var(--blue); color: #fff; border: none; padding: 14px; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; font-size: 14px; transition: 0.3s; height: 48px; letter-spacing: 1px; }
        .btn:hover { background: #2563EB; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); transform: translateY(-2px); }

        .pipeline-container { display: flex; flex-direction: column; gap: 20px; margin-bottom: 50px; }
        .funnel-row { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px 25px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 5px 25px rgba(0,0,0,0.4); position: relative; overflow: hidden; transition: 0.3s; }
        .funnel-row:hover { border-color: #374151; transform: scale(1.01); }
        .funnel-row::before { content: ''; position: absolute; left: 0; top: 0; width: 6px; height: 100%; }
        .funnel-row.good::before { background: var(--green); }
        .funnel-row.warning::before { background: var(--alert); }
        .funnel-row.bad::before { background: var(--red); }
        .funnel-row.neutral::before { background: var(--muted); }

        .ad-identity { width: 200px; }
        .ad-name { font-size: 18px; font-weight: 900; color: var(--text); text-transform: uppercase; margin-bottom: 5px; }
        .ad-badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 900; letter-spacing: 1px; }
        .ad-badge.good { background: rgba(16,185,129,0.15); color: var(--green); }
        .ad-badge.warning { background: rgba(245,158,11,0.15); color: var(--alert); }
        .ad-badge.bad { background: rgba(239,68,68,0.15); color: var(--red); }

        .funnel-stage { background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 12px 15px; text-align: center; flex: 1; position: relative; }
        .stage-title { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; border-bottom: 1px solid #1f2937; padding-bottom: 5px; }
        .stage-metrics { display: flex; justify-content: space-around; }
        .metric { display: flex; flex-direction: column; align-items: center; }
        .metric-val { font-size: 20px; font-weight: 900; font-family: monospace; }
        .metric-lbl { font-size: 9px; color: #6B7280; font-weight: 600; text-transform: uppercase; margin-top: 4px; }
        
        .arrow { color: var(--border); font-size: 20px; font-weight: 900; margin: 0 10px; }

        .cac-box { width: 150px; text-align: right; }
        .cac-lbl { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .cac-val { font-size: 24px; font-weight: 900; font-family: monospace; }

        .c-meta { color: var(--text); }
        .c-zara { color: var(--blue); }
        .c-int { color: var(--alert); }
        .c-res { color: var(--green); }
        .c-bad { color: var(--red); }

        .table-container { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow-x: auto; padding: 1px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: center; }
        th { background: #000; color: var(--muted); padding: 18px 12px; font-weight: 800; text-transform: uppercase; border-bottom: 2px solid var(--border); font-size: 10px; letter-spacing: 0.5px; }
        td { padding: 18px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:hover { background: rgba(255,255,255,0.02); }
        tfoot { background: #000; font-weight: 900; font-size: 13px; }
        tfoot td { border-top: 2px solid var(--border); color: var(--text); }
        
        #loader { display: none; text-align: center; padding: 100px; font-weight: 900; color: var(--blue); font-size: 20px; letter-spacing: 3px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>BODY ELITE <span>CEO ANALYTICS</span></h1>
                <div class="header-subtitle">Pipeline Maestro: Atribución 1 a 1 de Meta ➔ Zara ➔ Reservo</div>
            </div>
            <div class="date-box">
                <div class="date-col">
                    <label>COHORTE DESDE (ZARA)</label>
                    <input type="date" id="fi" value="2026-03-01">
                </div>
                <div class="date-col">
                    <label>COHORTE HASTA (ZARA)</label>
                    <input type="date" id="ff" value="2026-03-09">
                </div>
            </div>
        </div>

        <div class="upload-section">
            <div class="upload-box">
                <label>1. META (INVERSIÓN RAW)</label>
                <input type="file" id="fm" accept=".csv, .xlsx, .xls">
            </div>
            <div class="upload-box">
                <label style="color:var(--blue);">2. ZARA (TRACCIÓN DASH)</label>
                <input type="file" id="fz" accept=".csv, .xlsx, .xls">
            </div>
            <div class="upload-box">
                <label style="color:var(--green);">3. RESERVO (CIERRE CITAS)</label>
                <input type="file" id="fr" accept=".xlsx,.xls,.csv">
            </div>
            <button class="btn" onclick="ejecutarRadar()">CALCULAR ROI REAL</button>
        </div>

        <div id="loader">CRUZANDO BASES DE DATOS... ⚙️</div>

        <div id="dashboard" style="display:none;">
            <div class="pipeline-container" id="gridTarjetas"></div>

            <div class="table-container" style="margin-top: 50px;">
                <table>
                    <thead>
                        <tr>
                            <th style="text-align: left;">CÉLULA DE CAMPAÑA</th>
                            <th>GASTO META</th>
                            <th>CHATS META</th>
                            <th style="border-left: 2px solid var(--border);">LEADS ZARA</th>
                            <th style="color:var(--muted);">COSTO x LEAD</th>
                            <th style="border-left: 2px solid var(--border); color:var(--alert);">INTENCIÓN 🔥</th>
                            <th style="color:var(--green);">AGENDAS ✅</th>
                            <th style="color:var(--blue);">EFECTIVIDAD (%)</th>
                            <th style="border-left: 2px solid var(--border);">COSTO x AGENDA</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoEmbudo"></tbody>
                    <tfoot id="pieEmbudo"></tfoot>
                </table>
            </div>
        </div>
    </div>

    <script>
        const cleanPhone = (n) => String(n || '').split('.')[0].replace(/\D/g,'').slice(-8);
        const norm = (s) => String(s || '').normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        const fmtMoney = (n) => new Intl.NumberFormat('es-CL', {style:'currency', currency:'CLP', maximumFractionDigits: 0}).format(n);
        
        function excelToDate(serial) {
            if(!serial || isNaN(serial)) return 0;
            return Math.round((parseFloat(serial) - 25569) * 86400 * 1000) + (new Date().getTimezoneOffset() * 60000);
        }

        function parseDate(dateStr) {
            if(!dateStr) return 0;
            let parts = String(dateStr).split(' ')[0].split('-');
            if(parts.length >= 3) {
                if (parts[0].length <= 2) return new Date(parts[2], parts[1]-1, parts[0]).getTime();
                return new Date(parts[0], parts[1]-1, parts[2]).getTime();
            }
            return new Date(dateStr).getTime();
        }

        async function rxArray(f) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                        resolve(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1, raw: false}));
                    } catch(err) { reject(err); }
                };
                reader.readAsArrayBuffer(f);
            });
        }
        
        async function readDashCSV(f) {
            if (!f.name.toLowerCase().endsWith('.csv')) return rxArray(f);
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        let lines = e.target.result.split('\n');
                        let data = [];
                        lines.forEach(line => {
                            if (line.trim()) {
                                let row = line.split(';').map(c => c.replace(/^"|"$/g, '').trim());
                                if(row.length === 1) row = line.split(',').map(c => c.replace(/^"|"$/g, '').trim());
                                data.push(row);
                            }
                        });
                        resolve(data);
                    } catch(err) { reject(err); }
                };
                reader.readAsText(f);
            });
        }

        async function ejecutarRadar() {
            const fm = document.getElementById('fm').files[0];
            const fz = document.getElementById('fz').files[0];
            const fr = document.getElementById('fr').files[0];
            
            if(!fm || !fz || !fr) return alert('CEO, sube los 3 archivos para procesar el embudo.');
            
            const fi = new Date(document.getElementById('fi').value + 'T00:00:00').getTime();
            const ff = new Date(document.getElementById('ff').value + 'T23:59:59').getTime();
            
            let hoyReal = new Date();
            hoyReal.setHours(0,0,0,0);
            const hoyTs = hoyReal.getTime();

            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            try {
                const [metaArr, zaraRaw, reserArr] = await Promise.all([rxArray(fm), readDashCSV(fz), rxArray(fr)]);
                
                let anuncios = {
                    "LIPO FRAN": { nombre: "LIPO FRAN", gasto: 0, resMeta: 0, entraron: 0, conIntencion: 0, agendaron: 0 },
                    "FACIAL PIA": { nombre: "FACIAL PIA", gasto: 0, resMeta: 0, entraron: 0, conIntencion: 0, agendaron: 0 },
                    "ROSTRO VERANO": { nombre: "ROSTRO VERANO", gasto: 0, resMeta: 0, entraron: 0, conIntencion: 0, agendaron: 0 },
                    "ORGÁNICO / OTROS": { nombre: "ORGÁNICO / OTROS", gasto: 0, resMeta: 0, entraron: 0, conIntencion: 0, agendaron: 0 }
                };

                // === 1. PROCESADOR META ===
                const metaH = metaArr[0] || [];
                let cAnuncio = metaH.findIndex(h => String(h).toLowerCase().includes('anuncio') && !String(h).toLowerCase().includes('conjunto'));
                let cGasto = metaH.findIndex(h => String(h).toLowerCase().includes('importe gastado') || String(h).toLowerCase().includes('spent'));
                let cRes = metaH.findIndex(h => String(h).toLowerCase() === 'resultados' || String(h).toLowerCase().includes('results'));
                let cEntrega = metaH.findIndex(h => String(h).toLowerCase().includes('entrega'));

                metaArr.slice(1).forEach(r => {
                    let nombreOriginal = String(r[cAnuncio] || '').trim();
                    let entrega = cEntrega !== -1 ? String(r[cEntrega] || '').toLowerCase() : 'active';
                    
                    if (!entrega.includes('active') && !entrega.includes('activo') && !entrega.includes('curso') && cEntrega !== -1) return;

                    let nombreNorm = norm(nombreOriginal);
                    let spend = parseFloat(r[cGasto]) || 0;
                    let resultados = parseInt(r[cRes]) || 0;
                    
                    if(spend > 0 || resultados > 0) {
                        let adKey = "ORGÁNICO / OTROS";
                        if (nombreNorm.includes("lipo")) adKey = "LIPO FRAN";
                        else if (nombreNorm.includes("rostro")) adKey = "ROSTRO VERANO";
                        else if (nombreNorm.includes("facial") || nombreNorm.includes("hifu") || nombreNorm.includes("antiage") || nombreNorm.includes("pia")) adKey = "FACIAL PIA";

                        anuncios[adKey].gasto += spend;
                        anuncios[adKey].resMeta += resultados;
                    }
                });

                // === 2. PROCESADOR RESERVO ===
                const reserHeaders = reserArr[0] || [];
                let cFecCitaR = reserHeaders.findIndex(h => String(h).toLowerCase().trim() === 'fecha');
                let cTreatR = reserHeaders.findIndex(h => String(h).toLowerCase().includes('tratamiento'));
                let cTelR = reserHeaders.findIndex(h => String(h).toLowerCase().includes('tel') || String(h).toLowerCase().includes('celular'));
                let cEstR = reserHeaders.findIndex(h => String(h).toLowerCase().includes('estado cita'));
                
                if(cFecCitaR === -1) cFecCitaR = 1; if(cTreatR === -1) cTreatR = 6; 
                if(cTelR === -1) cTelR = 11; if(cEstR === -1) cEstR = 13;

                let totalAgendasValidas = 0;
                let mapTelefonosReservos = new Map();

                reserArr.slice(1).forEach(row => {
                    let treat = norm(row[cTreatR]);
                    if (!treat.includes('evalua') && !treat.includes('eval.')) return; 

                    let tsCita = typeof row[cFecCitaR] === 'number' ? excelToDate(row[cFecCitaR]) : parseDate(row[cFecCitaR]);
                    let estado = norm(row[cEstR]);
                    let phone = cleanPhone(row[cTelR]);

                    let esValida = false;
                    if (tsCita < hoyTs) {
                        if (['atendido', 'asiste', 'asistio', 'realizado'].some(e => estado.includes(e))) esValida = true;
                    } else {
                        if (!['anulado', 'cancelado', 'eliminado', 'no asiste', 'no llego', 'suspend'].some(e => estado.includes(e))) esValida = true;
                    }

                    if (esValida) {
                        totalAgendasValidas++;
                        if (phone.length >= 8) {
                            mapTelefonosReservos.set(phone, true); 
                        }
                    }
                });

                let agendasAsignadas = 0;

                // === 3. PROCESADOR ZARA DASH (MAPEO POR DICCIONARIO) ===
                let zh = zaraRaw[0] || [];
                let cFecZ = zh.findIndex(h => String(h).toLowerCase().includes('fecha'));
                let cTelZ = zh.findIndex(h => String(h).toLowerCase().includes('telefono'));
                let cEstZ = zh.findIndex(h => String(h).toLowerCase().includes('estado'));
                let cMsgZ = zh.findIndex(h => String(h).toLowerCase().includes('primer mensaje'));
                let cBitZ = zh.findIndex(h => String(h).toLowerCase().includes('bitacora'));

                if(cFecZ === -1) cFecZ = 0; if(cTelZ === -1) cTelZ = 1; 
                if(cEstZ === -1) cEstZ = 3; if(cMsgZ === -1) cMsgZ = 4; if(cBitZ === -1) cBitZ = 5;

                zaraRaw.slice(1).forEach(r => {
                    let ts = parseDate(r[cFecZ]);
                    if(ts < fi || ts > ff) return; 
                    
                    let msg = norm(r[cMsgZ]);
                    let tag = norm(r[cEstZ]);
                    let bit = norm(r[cBitZ] || '');
                    let phone = cleanPhone(r[cTelZ]);

                    if(!msg && !tag) return;

                    let adDuenio = "ORGÁNICO / OTROS";
                    if (msg.includes("lipo")) adDuenio = "LIPO FRAN";
                    else if (msg.includes("rostro")) adDuenio = "ROSTRO VERANO";
                    else if (msg.includes("facial") || msg.includes("diagnosti") || msg.includes("limpieza") || msg.includes("hifu")) adDuenio = "FACIAL PIA";

                    const s = anuncios[adDuenio];
                    s.entraron++;

                    let tieneIntencion = false;
                    if (['hot', 'interesado', 'gestión', 'gestion', 'agendado'].includes(tag)) tieneIntencion = true;
                    if (bit.includes("agendad") || bit.includes("hora") || bit.includes("cita") || bit.includes("reserva")) tieneIntencion = true;

                    // Validar en Reservo
                    if (mapTelefonosReservos.has(phone)) {
                        s.agendaron++;
                        agendasAsignadas++;
                        mapTelefonosReservos.delete(phone);
                        tieneIntencion = true; 
                    }

                    if (tieneIntencion) s.conIntencion++;
                });

                // Volcamos lo no asigando a Organico (el resto real del negocio)
                anuncios["ORGÁNICO / OTROS"].agendaron += (totalAgendasValidas - agendasAsignadas);

                // === 4. RENDER ===
                let htmlTabla = "", htmlGrid = "";
                let tGasto=0, tMeta=0, tEntr=0, tInt=0, tAgen=0;

                Object.values(anuncios).sort((a,b) => b.gasto - a.gasto).forEach(s => {
                    if(s.gasto === 0 && s.entraron === 0 && s.agendaron === 0) return; 

                    tGasto += s.gasto; tMeta += s.resMeta; tEntr += s.entraron;
                    tInt += s.conIntencion; tAgen += s.agendaron;

                    let cpl = s.entraron > 0 ? s.gasto / s.entraron : 0;
                    let cac = s.agendaron > 0 ? s.gasto / s.agendaron : 0;
                    let efectividad = s.entraron > 0 ? (s.agendaron / s.entraron) * 100 : 0;
                    
                    let estadoClass = "neutral", badgeClass = "neutral", badgeText = "ORGÁNICO";
                    if (s.gasto > 0) {
                        if (s.agendaron > 0) {
                            estadoClass = "good"; badgeClass = "good"; badgeText = "🟢 RENTABLE";
                        } else if (s.conIntencion > 0) {
                            estadoClass = "warning"; badgeClass = "warning"; badgeText = "🟡 PIPELINE";
                        } else {
                            estadoClass = "bad"; badgeClass = "bad"; badgeText = "🔴 APAGAR";
                        }
                    }

                    if (s.nombre !== "ORGÁNICO / OTROS" || s.entraron > 0 || s.agendaron > 0) {
                        htmlGrid += `
                        <div class="funnel-row ${estadoClass}">
                            <div class="ad-identity">
                                <div class="ad-name">${s.nombre}</div>
                                <div class="ad-badge ${badgeClass}">${badgeText}</div>
                            </div>
                            
                            <div class="funnel-stage">
                                <div class="stage-title">1. META</div>
                                <div class="stage-metrics">
                                    <div class="metric"><span class="metric-val c-meta">$${fmtMoney(s.gasto)}</span><span class="metric-lbl">Gasto</span></div>
                                </div>
                            </div>
                            
                            <div class="arrow">➔</div>
                            
                            <div class="funnel-stage">
                                <div class="stage-title">2. ZARA</div>
                                <div class="stage-metrics">
                                    <div class="metric"><span class="metric-val c-zara">${s.entraron}</span><span class="metric-lbl">Leads</span></div>
                                    <div class="metric"><span class="metric-val" style="color:#9CA3AF;">$${fmtMoney(cpl)}</span><span class="metric-lbl">Costo x Lead</span></div>
                                </div>
                            </div>

                            <div class="arrow">➔</div>

                            <div class="funnel-stage" style="flex: 0.8;">
                                <div class="stage-title">3. RESERVO</div>
                                <div class="stage-metrics">
                                    <div class="metric"><span class="metric-val c-res">${s.agendaron}</span><span class="metric-lbl">Agendas</span></div>
                                    <div class="metric"><span class="metric-val c-blue">${efectividad.toFixed(0)}%</span><span class="metric-lbl">Cierre</span></div>
                                </div>
                            </div>

                            <div class="cac-box">
                                <div class="cac-lbl">Costo x Agenda</div>
                                <div class="cac-val ${s.gasto>0 && s.agendaron===0 ? 'c-bad' : 'c-res'}">${cac > 0 ? '$'+fmtMoney(cac) : (s.gasto > 0 ? 'PÉRDIDA' : '---')}</div>
                            </div>
                        </div>`;
                    }

                    htmlTabla += `<tr>
                        <td style="text-align:left;"><b>${s.nombre}</b></td>
                        <td style="font-family:monospace; font-weight:bold;">${s.gasto > 0 ? '$'+fmtMoney(s.gasto) : '---'}</td>
                        <td style="color:var(--muted)">${s.resMeta}</td>
                        <td style="border-left: 2px solid var(--border); font-weight:900; font-size:14px;">${s.entraron}</td>
                        <td style="color:var(--muted); font-family:monospace;">${cpl > 0 ? '$'+fmtMoney(cpl) : '-'}</td>
                        <td style="border-left: 2px solid var(--border); color:var(--alert); font-weight:bold;">${s.conIntencion}</td>
                        <td style="color:var(--green); font-weight:900; font-size:14px;">${s.agendaron}</td>
                        <td style="color:var(--blue); font-weight:bold;">${efectividad.toFixed(1)}%</td>
                        <td style="border-left: 2px solid var(--border); font-family:monospace; font-size:14px; font-weight:bold;" class="${s.gasto>0 && s.agendaron===0 ? 'c-bad' : 'c-res'}">${cac > 0 ? '$'+fmtMoney(cac) : (s.gasto>0?'PÉRDIDA':'---')}</td>
                    </tr>`;
                });

                document.getElementById('gridTarjetas').innerHTML = htmlGrid;
                document.getElementById('cuerpoEmbudo').innerHTML = htmlTabla;
                
                let cplTotal = tEntr > 0 ? tGasto / tEntr : 0;
                let cacTotal = tAgen > 0 ? tGasto / tAgen : 0;
                let efecTotal = tEntr > 0 ? (tAgen / tEntr) * 100 : 0;
                
                document.getElementById('pieEmbudo').innerHTML = `<tr>
                    <td style="text-align:left; color:var(--blue);">TOTAL NEGOCIO</td>
                    <td style="font-family:monospace; font-weight:bold;">$${fmtMoney(tGasto)}</td>
                    <td style="color:var(--muted)">${tMeta}</td>
                    <td style="border-left: 2px solid var(--border); font-weight:900; font-size:14px;">${tEntr}</td>
                    <td style="color:var(--muted); font-family:monospace;">$${fmtMoney(cplTotal)}</td>
                    <td style="border-left: 2px solid var(--border); color:var(--alert); font-weight:bold;">${tInt}</td>
                    <td style="color:var(--green); font-weight:900; font-size:15px; text-decoration: underline;">${tAgen}</td>
                    <td style="color:var(--blue); font-weight:bold;">${efecTotal.toFixed(1)}%</td>
                    <td style="border-left: 2px solid var(--border); color:var(--green); font-family:monospace; font-size:15px; font-weight:900;">${cacTotal > 0 ? '$'+fmtMoney(cacTotal) : '---'}</td>
                </tr>`;

                document.getElementById('loader').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';

            } catch(e) {
                console.error(e);
                alert('🚨 ERROR FATAL: Verifica que los archivos estén íntegros.');
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
