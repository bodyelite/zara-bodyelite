<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BODY ELITE - CEO DECISION BOARD (FIX IDENTIDAD)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #060B14; --card: #111827; --border: #1F2937; --text: #F9FAFB; --muted: #9CA3AF; --green: #10B981; --red: #EF4444; --blue: #3B82F6; --alert: #F59E0B; --purple: #8B5CF6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px; }
        .container { max-width: 1600px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header h1 { margin: 0; font-weight: 900; font-size: 28px; color: var(--text); letter-spacing: -1px; }
        .header span { color: var(--blue); }
        
        .upload-section { display: grid; grid-template-columns: repeat(3, 1fr) 200px; gap: 15px; background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 30px; align-items: end; }
        .upload-box label { display: block; font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
        .upload-box input { width: 100%; background: #000; border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; box-sizing: border-box; font-family: monospace; }
        .date-box { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { background: var(--blue); color: #fff; border: none; padding: 14px; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; font-size: 14px; transition: 0.3s; height: 44px; }
        .btn:hover { background: #2563EB; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }

        .decision-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .ad-card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; gap: 20px; position: relative; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .ad-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; }
        .ad-card.good::before { background: var(--green); }
        .ad-card.bad::before { background: var(--red); }
        .ad-card.warning::before { background: var(--alert); }
        
        .pipeline-flow { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .flow-step { text-align: center; }
        .flow-val { font-size: 20px; font-weight: 900; }
        .flow-label { font-size: 9px; color: var(--muted); text-transform: uppercase; }

        .table-container { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow-x: auto; padding: 1px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: center; }
        th { background: #000; color: var(--muted); padding: 16px 12px; font-weight: 800; text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 16px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .text-left { text-align: left; }
        .money { font-family: monospace; font-weight: bold; }
        
        #loader { display: none; text-align: center; padding: 80px; font-weight: 900; color: var(--blue); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>BODY ELITE <span>CEO BOARD</span></h1>
                <p>Triple Validación de Identidad (Teléfono + Nombre + Bitácora)</p>
            </div>
            <div class="date-box">
                <div><label>DESDE</label><input type="date" id="fi" value="2026-02-01"></div>
                <div><label>HASTA</label><input type="date" id="ff" value="2026-03-31"></div>
            </div>
        </div>

        <div class="upload-section">
            <div class="upload-box"><label>1. META (GASTO)</label><input type="file" id="fm" accept=".csv, .xlsx, .xls"></div>
            <div class="upload-box"><label>2. ZARA (DASH CSV)</label><input type="file" id="fz" accept=".csv, .xlsx, .xls"></div>
            <div class="upload-box"><label>3. RESERVO (CITAS)</label><input type="file" id="fr" accept=".xlsx,.xls,.csv"></div>
            <button class="btn" onclick="ejecutarRadar()">CRUZAR DATA</button>
        </div>

        <div id="loader">SINCRONIZANDO IDENTIDADES... ⚙️</div>
        <div id="dashboard" style="display:none;">
            <div class="decision-grid" id="gridTarjetas"></div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th class="text-left">ANUNCIO META</th>
                            <th>GASTO</th>
                            <th>COSTO DÍA</th>
                            <th>RESULTADOS (META)</th>
                            <th style="border-left: 2px solid var(--border);">ENTRARON (DASH)</th>
                            <th>DORMIDOS</th>
                            <th>CON INTENCIÓN</th>
                            <th style="border-left: 2px solid var(--border);">AGENDARON (RESERVO)</th>
                            <th>COMPRARON</th>
                            <th style="border-left: 2px solid var(--border);">ESTADO CAC</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoEmbudo"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const cleanID = (n) => String(n || '').split('.')[0].replace(/\D/g,'').slice(-8);
        const norm = (s) => String(s || '').normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        const fmtMoney = (n) => new Intl.NumberFormat('es-CL', {style:'currency', currency:'CLP', maximumFractionDigits: 0}).format(n);
        
        function excelDate(s) { return isNaN(s) ? new Date(s).getTime() : Math.round((parseFloat(s) - 25569) * 86400 * 1000) + (new Date().getTimezoneOffset() * 60000); }

        const REGLAS = [
            { id: "LIPO FRAN", keysMeta: ["lipo fran", "lipo_trajeblanco", "video_fran"], frase: "quiero agendar mi evaluacion diagnostica lipo" },
            { id: "FACIAL PIA", keysMeta: ["facial pia", "carrusel_hifu", "chats_antiage"], frase: "hola, quiero agendar diagnostico facial" },
            { id: "ROSTRO VERANO", keysMeta: ["rostro verano", "rostro_verano"], frase: "quiero mi evaluacion rostro" }
        ];

        async function parseCSV(f) {
            return new Promise(resolve => {
                const r = new FileReader();
                r.onload = (e) => {
                    let rows = e.target.result.split('\n').filter(l => l.trim()).map(l => l.split(';').map(c => c.replace(/^"|"$/g, '').trim()));
                    resolve(rows);
                };
                r.readAsText(f);
            });
        }

        async function parseXLS(f) {
            return new Promise(resolve => {
                const r = new FileReader();
                r.onload = (e) => resolve(XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).SheetNames[0]], {header: 1, raw: false}));
                r.readAsArrayBuffer(f);
            });
        }

        async function ejecutarRadar() {
            const fm = document.getElementById('fm').files[0], fz = document.getElementById('fz').files[0], fr = document.getElementById('fr').files[0];
            if(!fm || !fz || !fr) return alert('Sube los 3 archivos.');
            
            const fi = new Date(document.getElementById('fi').value + 'T00:00:00').getTime();
            const ff = new Date(document.getElementById('ff').value + 'T23:59:59').getTime();
            
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            try {
                const [metaArr, dashArr, resArr] = await Promise.all([parseXLS(fm), parseCSV(fz), parseXLS(fr)]);
                let ads = {};

                // 1. META
                metaArr.slice(1).forEach(r => {
                    let name = String(r[2] || '').trim(), spend = parseFloat(r[12]) || 0, res = parseInt(r[5]) || 0;
                    if(spend > 0) {
                        let key = "ORGANICO";
                        for (let reg of REGLAS) { if (reg.keysMeta.some(k => norm(name).includes(k))) { key = reg.id; break; } }
                        if(!ads[key]) ads[key] = { name: key, spend: 0, resMeta: 0, ent: 0, dorm: 0, int: 0, agen: 0, comp: 0 };
                        ads[key].spend += spend; ads[key].resMeta += res;
                    }
                });

                // 2. RESERVO (NORMALIZADO)
                const reserData = resArr.slice(1).map(r => ({
                    tel: cleanID(r[11]),
                    nom: norm(r[9]).split(' ')[0],
                    ape: norm(r[9]).split(' ')[1] || "",
                    est: norm(r[13]),
                    pago: norm(r[14]),
                    fec: excelDate(r[1])
                }));

                // 3. DASH ZARA (TRIPLE CRUCE)
                dashArr.slice(1).forEach(r => {
                    let dFec = excelDate(r[0].split(' ')[0]);
                    if (dFec < fi || dFec > ff) return;

                    let dMsg = norm(r[4]), dBit = norm(r[5]), dTag = norm(r[3]).toUpperCase();
                    let dTel = cleanID(r[1]), dNom = norm(r[2]).split(' ')[0];

                    let key = "ORGANICO";
                    for (let reg of REGLAS) { if (dMsg.includes(reg.frase)) { key = reg.id; break; } }
                    if(!ads[key]) ads[key] = { name: key, spend: 0, resMeta: 0, ent: 0, dorm: 0, int: 0, agen: 0, comp: 0 };

                    ads[key].ent++;

                    // CRUCE DE IDENTIDAD BLINDADO
                    let match = reserData.find(c => (dTel.length >= 8 && c.tel === dTel) || (dNom.length >= 3 && c.nom === dNom));
                    let agendoEnRealidad = (match && !['anula', 'no asiste', 'cancelado'].includes(match.est)) || dBit.includes("agendada") || dBit.includes("reservo") || dTag === "AGENDADO";
                    let asiste = match && ['asiste', 'atendido', 'realizado', 'confirmado'].includes(match.est);
                    let compro = match && ['pagado', 'abono', 'plan', 'si'].includes(match.pago);

                    if (agendoEnRealidad) {
                        ads[key].agen++;
                        ads[key].int++; // Si agendó, tuvo intención
                    } else if (['HOT', 'INTERESADO', 'GESTIÓN'].includes(dTag)) {
                        ads[key].int++;
                    } else {
                        ads[key].dorm++;
                    }

                    if (asiste) ads[key].agen++; // Refuerzo por si bitacora falló
                    if (compro) ads[key].comp++;
                });

                // 4. RENDER
                let htmlT = "", htmlG = "";
                Object.values(ads).sort((a,b)=>b.spend-a.spend).forEach(s => {
                    let cac = s.agen > 0 ? s.spend / s.agen : 0;
                    let est = s.spend > 0 ? (s.agen > 0 ? "good" : (s.int > 0 ? "warning" : "bad")) : "neutral";
                    
                    htmlG += `<div class="ad-card ${est}"><div style="font-weight:900;">${s.name}</div><div class="pipeline-flow"><div class="flow-step"><div class="flow-val">${s.ent}</div><div class="flow-label">Entraron</div></div><div class="flow-arrow">➔</div><div class="flow-step"><div class="flow-val" style="color:var(--alert);">${s.int}</div><div class="flow-label">Interés</div></div><div class="flow-arrow">➔</div><div class="flow-step"><div class="flow-val" style="color:var(--green);">${s.agen}</div><div class="flow-label">Agendas</div></div></div><div style="font-size:16px; font-weight:900; text-align:right;">${cac > 0 ? '$'+fmtMoney(cac) : 'PÉRDIDA'}</div></div>`;

                    htmlT += `<tr><td class="text-left"><b>${s.name}</b></td><td class="money">${fmtMoney(s.spend)}</td><td>${fmtMoney(s.spend/7)}</td><td>${s.resMeta}</td><td style="border-left: 2px solid var(--border); font-weight:900;">${s.ent}</td><td>${s.dorm}</td><td style="color:var(--alert);">${s.int}</td><td style="border-left: 2px solid var(--border); color:var(--green); font-weight:900;">${s.agen}</td><td style="color:var(--blue);">${s.comp}</td><td style="border-left: 2px solid var(--border); font-weight:900; color:${cac > 0 ? 'var(--green)' : 'var(--red)'}">${cac > 0 ? '$'+fmtMoney(cac) : '---'}</td></tr>`;
                });

                document.getElementById('gridTarjetas').innerHTML = htmlG;
                document.getElementById('cuerpoEmbudo').innerHTML = htmlT;
                document.getElementById('loader').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';

            } catch(e) { alert('Error de archivos. Revisa el punto y coma del Dash.'); document.getElementById('loader').style.display = 'none'; }
        }
    </script>
</body>
</html>
