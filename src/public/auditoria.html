<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Auditoría Estratégica Body Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .config-bar { background: #f8fafc; padding: 20px; border-radius: 10px; margin-bottom: 25px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; border: 1px solid #e2e8f0; }
        button { background: #2563eb; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        button:disabled { background: #94a3b8; }
        .card { background: #fff; padding: 20px; border-radius: 10px; border: 1px solid #e2e8f0; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th { background: #1e293b; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #e2e8f0; }
        .fuga { background: #fff7ed; color: #9a3412; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ Altar de Números: Auditoría Final</h1>
        <div class="config-bar">
            <div><label>Desde:</label><input type="date" id="fi" value="2026-03-01"></div>
            <div><label>Hasta:</label><input type="date" id="ff" value="2026-03-31"></div>
            <div><label>Meta (Excel):</label><input type="file" id="fm"></div>
            <div><label>Reservo (Excel):</label><input type="file" id="fr"></div>
        </div>
        <button id="btn" onclick="analizar()">EJECUTAR ANÁLISIS</button>
        <div id="dash" style="display:none; margin-top:30px;">
            <div id="met" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; margin-bottom:20px;"></div>
            <table>
                <thead>
                    <tr><th>Lead</th><th>Estado</th><th>Origen</th><th>Bitácora</th><th>Reservo</th><th>Veredicto</th></tr>
                </thead>
                <tbody id="cuerpo"></tbody>
            </table>
        </div>
    </div>
    <script>
        const clean = (n) => String(n || '').replace(/\D/g,'').slice(-8);
        async function read(f) {
            return new Promise(r => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                    r(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
                };
                reader.readAsArrayBuffer(f);
            });
        }
        async function analizar() {
            const fm = document.getElementById('fm').files[0];
            const fr = document.getElementById('fr').files[0];
            const fi = new Date(document.getElementById('fi').value);
            const ff = new Date(document.getElementById('ff').value);
            if(!fm || !fr) return alert('Subí los reportes.');
            
            document.getElementById('btn').disabled = true;
            try {
                const [dMeta, dReservo, dMonitor] = await Promise.all([
                    read(fm), read(fr), fetch('/api/data').then(res => res.json())
                ]);

                if (!dMonitor || dMonitor.length === 0) {
                    alert('EL SERVIDOR NO DEVOLVIÓ LEADS. Revisá la conexión del Monitor.');
                    return;
                }

                let gasto = 0;
                dMeta.forEach(row => {
                    let v = row['Importe gastado (CLP)'] || row['Amount spent'] || 0;
                    gasto += parseFloat(v.toString().replace(/[^0-9.]/g, '')) || 0;
                });

                const cuerpo = document.getElementById('cuerpo');
                cuerpo.innerHTML = '';
                let asistencias = 0;
                let leadsEnRango = 0;

                dMonitor.forEach(lead => {
                    const f = new Date(lead.lastMessageDate);
                    if(f < fi || f > ff) return;
                    leadsEnRango++;

                    const num = clean(lead.number);
                    const cita = dReservo.find(c => clean(c['Teléfono']) === num);
                    const esAsist = cita && (cita['Estado de la cita'] === 'Asiste' || cita['Estado de la cita'] === 'Realizado');
                    if(esAsist) asistencias++;

                    const row = document.createElement('tr');
                    const esFuga = !cita && lead.status === 'HOT';
                    if(esFuga) row.className = 'fuga';

                    row.innerHTML = `
                        <td><b>${lead.name}</b><br>${lead.number}</td>
                        <td>${lead.status}</td>
                        <td>${lead.adName || '-'}</td>
                        <td style="font-size:10px;">${lead.notes || 'Sin notas'}</td>
                        <td>${cita ? '✅ ' + cita['Estado de la cita'] : '❌ No figura'}</td>
                        <td><b>${esAsist ? 'LOGRADO' : (esFuga ? 'FUGA CALIENTE' : 'SEGUIMIENTO')}</b></td>
                    `;
                    cuerpo.appendChild(row);
                });

                if(leadsEnRango === 0) alert('No hay leads en el monitor para el rango de fechas seleccionado.');

                const cac = asistencias > 0 ? (gasto / asistencias) : gasto;
                document.getElementById('met').innerHTML = `
                    <div class="card">Gasto: ${gasto.toLocaleString('es-CL',{style:'currency',currency:'CLP'})}</div>
                    <div class="card">Asistencias: ${asistencias}</div>
                    <div class="card" style="background:#dcfce7">CAC: ${cac.toLocaleString('es-CL',{style:'currency',currency:'CLP'})}</div>
                `;
                document.getElementById('dash').style.display = 'block';
            } catch (err) { 
                alert('Error crítico: ' + err.message); 
                console.error(err);
            } finally { 
                document.getElementById('btn').disabled = false; 
            }
        }
    </script>
</body>
</html>
