services:
  - type: web
    name: zara-bodyelite1
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: VERIFY_TOKEN
        value: zara_bodyelite_verify
      - key: PORT
        value: 10000
      - key: WHATSAPP_TOKEN
        sync: false
