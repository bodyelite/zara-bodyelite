# render.yaml
# Configuración de despliegue en Render para Zara IA

services:
  - type: web
    name: zara-ia-body-elite
    env: node
    region: oregon
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: PAGE_ACCESS_TOKEN
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: APP_SECRET
        sync: false
