services:
  - type: web
    name: zara-bodyelite
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: WHATSAPP_TOKEN
        sync: false
      - key: VERIFY_TOKEN
        value: "zara_bodyelite_verify"
      - key: PHONE_ID
        sync: false
      - key: AI_ENDPOINT
        value: ""
    autoDeploy: true
